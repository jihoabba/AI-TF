name: Auto-update Index

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
      - 'idea/**'
      - 'meeting-notes/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build index
        run: node scripts/build-index.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "변경 없음, 스킵" || (
            git commit -m "chore: auto-update index [skip ci]" &&
            git push
          )
