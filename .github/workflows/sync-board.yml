name: Sync Notion Board

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 자동 동기화
  workflow_dispatch:          # 수동 실행 가능

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notion → board.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-board.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add board.json
          git diff --staged --quiet && echo "변경 없음, 스킵" || (
            git commit -m "chore: sync board from Notion [skip ci]" &&
            git push
          )
