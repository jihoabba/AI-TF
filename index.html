<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI TF — LINE FRIENDS SQUARE</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text: #1d1d1f;
    --text-secondary: rgba(0,0,0,0.5);
    --accent: #0071e3;
    --green: #1d8348;
    --orange: #b95000;
    --divider: rgba(0,0,0,0.08);
    --divider-strong: rgba(0,0,0,0.14);
    --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --radius: 18px;
    --green-bg: rgba(29,131,72,0.08);
    --orange-bg: rgba(185,80,0,0.08);
    --blue-bg: rgba(0,113,227,0.07);
  }

  html {
    background: var(--bg);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body { min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: rgba(245,245,247,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--divider);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 48px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .header-sep { width: 1px; height: 14px; background: var(--divider-strong); }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .badge-live {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: var(--green-bg);
    border-radius: 100px;
    font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 0.04em;
  }
  .badge-live::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Hero ── */
  .hero { padding: 72px 48px 40px; max-width: 1200px; margin: 0 auto; }

  .hero-eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.1s;
  }
  .hero-title {
    font-size: 52px; font-weight: 700; letter-spacing: -0.03em;
    line-height: 1.05; color: var(--text); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.15s;
  }
  .hero-title span { color: var(--accent); }
  .hero-sub {
    font-size: 18px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.5; max-width: 560px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.2s;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Stats bar ── */
  .stats-bar {
    max-width: 1200px; margin: 0 auto; padding: 0 48px 44px;
    display: flex; gap: 12px; flex-wrap: wrap;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.25s;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: 100px; box-shadow: var(--shadow);
  }
  .stat-pill .num { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .stat-pill .lbl { font-size: 13px; color: var(--text-secondary); }
  .stat-pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-report  { background: var(--accent); }
  .dot-idea    { background: var(--orange); }
  .dot-meeting { background: var(--green); }

  /* ── Search ── */
  .search-wrap {
    max-width: 1200px; margin: 0 auto; padding: 0 48px 36px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.3s;
  }
  .search-box { position: relative; max-width: 480px; }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 14px; pointer-events: none; }
  .search-input {
    width: 100%; height: 44px; padding: 0 16px 0 42px;
    border: 1px solid var(--divider-strong); border-radius: 100px;
    background: var(--surface); font-size: 14px; color: var(--text);
    font-family: inherit; outline: none; transition: all 0.2s; box-shadow: var(--shadow);
  }
  .search-input::placeholder { color: var(--text-secondary); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12); }

  /* ── Section ── */
  .section { max-width: 1200px; margin: 0 auto; padding: 0 48px 64px; }

  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }

  .section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .section-count { font-size: 12px; color: rgba(0,0,0,0.28); }

  /* ── Cards grid ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1),
                box-shadow 0.2s cubic-bezier(0.4,0,0.2,1),
                border-color 0.2s;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card[data-type="report"]::before  { background: var(--accent); }
  .card[data-type="meeting"]::before { background: var(--green); }
  .card[data-type="idea"]::before    { background: var(--orange); }

  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: rgba(0,113,227,0.18); }

  .card:nth-child(1) { animation-delay: 0.35s; }
  .card:nth-child(2) { animation-delay: 0.40s; }
  .card:nth-child(3) { animation-delay: 0.45s; }
  .card:nth-child(4) { animation-delay: 0.50s; }
  .card:nth-child(5) { animation-delay: 0.55s; }

  /* Card body */
  .card-body { padding: 20px 22px 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .tag { padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
  .tag-report  { background: var(--blue-bg);   color: var(--accent); }
  .tag-idea    { background: var(--orange-bg); color: var(--orange); }
  .tag-meeting { background: var(--green-bg);  color: var(--green); }
  .tag-kickoff { background: var(--blue-bg);   color: var(--accent); }
  .tag-new     { background: rgba(0,113,227,0.1); color: var(--accent); }
  .tag-draft   { background: var(--orange-bg); color: var(--orange); }

  .card-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.3; }
  .card-desc  { font-size: 13px; color: var(--text-secondary); line-height: 1.5; flex: 1; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px solid var(--divider); margin-top: 4px;
  }
  .card-date { font-size: 12px; color: rgba(0,0,0,0.3); font-variant-numeric: tabular-nums; }
  .card-cta { font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 4px; transition: gap 0.15s; }
  .card:hover .card-cta { gap: 7px; }

  /* Empty state */
  .empty { grid-column: 1 / -1; text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 15px; }

  /* Search results view */
  .search-section { max-width: 1200px; margin: 0 auto; padding: 0 48px 64px; display: none; }
  .search-section.visible { display: block; }

  /* Hidden */
  .section.hidden { display: none; }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--divider);
    padding: 28px 48px;
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-left  { font-size: 12px; color: rgba(0,0,0,0.3); }
  .footer-right { font-size: 12px; color: rgba(0,0,0,0.3); display: flex; align-items: center; gap: 6px; }
  .footer-right a { color: var(--accent); text-decoration: none; }
  .footer-right a:hover { text-decoration: underline; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 0 24px; }
    .hero { padding: 48px 24px 32px; }
    .hero-title { font-size: 36px; }
    .hero-sub { font-size: 16px; }
    .stats-bar { padding: 0 24px 32px; }
    .search-wrap { padding: 0 24px 24px; }
    .search-box { max-width: 100%; }
    .section { padding: 0 24px 48px; }
    .search-section { padding: 0 24px 48px; }
    .cards { grid-template-columns: 1fr; }
    .footer { padding: 24px; flex-direction: column; gap: 8px; text-align: center; }
  }

  /* ── Board ── */
  .board-section { max-width: 1200px; margin: 0 auto; padding: 0 48px 72px; }

  .board-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .board-new-btn {
    margin-left: auto;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--divider-strong);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    transition: all 0.15s;
  }
  .board-new-btn:hover { border-color: var(--accent); color: var(--accent); }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-left: 3px solid #7c3aed;
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .note-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

  .note-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #7c3aed;
    margin-bottom: 2px;
  }

  .note-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.4;
  }

  .note-body {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .note-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--divider);
    margin-top: 2px;
  }

  .note-author {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .note-author img {
    width: 18px;
    height: 18px;
    border-radius: 50%;
  }

  .note-date { font-size: 11px; color: rgba(0,0,0,0.28); }

  .board-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 24px;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.7;
  }

  .dot-board { background: #7c3aed; }

  @media (max-width: 768px) {
    .board-section { padding: 0 24px 48px; }
    .board-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">LINE FRIENDS SQUARE</span>
    <div class="header-sep"></div>
    <span class="header-title">AI TF 아카이브</span>
  </div>
  <div class="header-right">
    <div class="badge-live">2026 Q2 진행중</div>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <div class="hero-eyebrow">AI Transformation Task Force</div>
  <h1 class="hero-title">산출물 <span>아카이브</span></h1>
  <p class="hero-sub">보고서, 목업, 회의록을 한 곳에서 관리합니다</p>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-pill">
    <span class="num" id="totalCount">—</span>
    <span class="lbl">총 문서</span>
  </div>
  <div class="stat-pill">
    <div class="dot dot-report"></div>
    <span class="num" id="reportCount">—</span>
    <span class="lbl">보고서</span>
  </div>
  <div class="stat-pill">
    <div class="dot dot-idea"></div>
    <span class="num" id="ideaCount">—</span>
    <span class="lbl">아이디어</span>
  </div>
  <div class="stat-pill">
    <div class="dot dot-meeting"></div>
    <span class="num" id="meetingCount">—</span>
    <span class="lbl">회의록</span>
  </div>
</div>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="문서 검색..." autocomplete="off">
  </div>
</div>

<!-- Search Results (shown only when searching) -->
<div class="search-section" id="searchSection">
  <div class="section-header">
    <span class="section-title">검색 결과</span>
    <span class="section-count" id="searchCount"></span>
  </div>
  <div class="cards" id="searchGrid"></div>
</div>

<!-- Section: 보고 자료 -->
<main class="section" id="section-reports">
  <div class="section-header">
    <div class="section-dot dot-report"></div>
    <span class="section-title">보고 자료</span>
    <span class="section-count" id="countReports"></span>
  </div>
  <div class="cards" id="gridReports"></div>
</main>

<!-- Section: 회의록 -->
<main class="section" id="section-meetings">
  <div class="section-header">
    <div class="section-dot dot-meeting"></div>
    <span class="section-title">회의록</span>
    <span class="section-count" id="countMeetings"></span>
  </div>
  <div class="cards" id="gridMeetings"></div>
</main>

<!-- Section: IDEA -->
<main class="section" id="section-ideas">
  <div class="section-header">
    <div class="section-dot dot-idea"></div>
    <span class="section-title">IDEA</span>
    <span class="section-count" id="countIdeas"></span>
  </div>
  <div class="cards" id="gridIdeas"></div>
</main>

<!-- Board -->
<section class="board-section">
  <div class="board-header">
    <div class="section-dot dot-board"></div>
    <span class="section-title">게시판</span>
    <a class="board-new-btn"
       href="https://github.com/jihoabba/AI-TF/issues/new?labels=board&template=board.md"
       target="_blank">+ 새 글 작성</a>
  </div>
  <div class="board-grid" id="boardGrid">
    <div class="board-state">불러오는 중…</div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="footer-left">LINE FRIENDS SQUARE AI TF &nbsp;·&nbsp; 2026 Q2</div>
  <div class="footer-right">
    GitHub Pages로 배포 &nbsp;·&nbsp;
    <a href="https://github.com/jihoabba/AI-TF" target="_blank">repo →</a>
  </div>
</footer>

<script>
  // [TF-DOCS-START] — 자동 생성 영역, scripts/build-index.js가 관리합니다
  const docs = [{"type":"report","id":"ai-tf-kickoff","title":"AI TF 킥오프","desc":"전사 AI 역량 강화 TF 출범 보고. 투트랙 전략, 로드맵, KPI, 예산 요청 포함.","file":"reports/ai-tf-kickoff.html","date":"2026-03-26","tags":["report","kickoff"],"slides":10},{"type":"idea","id":"popup_dashboard","title":"팝업 세일즈 대시보드","desc":"팝업 매출 현황 대시보드 아이디어. KPI, 일별 추이, 채널별·품목별 Sellthru, AI 인사이트 포함.","file":"idea/popup_dashboard.html","date":"2026-03-26","tags":["idea","dashboard"],"status":"Draft"},{"type":"meeting","id":"2026-03-26-1st-dev-meeting","title":"1차 개발 미팅","desc":"AI TF 오리엔테이션. 방향 정렬, 업무 프로세스 합의. 염동혁 · 최재균 (장혜리 부재).","file":"meeting-notes/2026-03-26-1st-dev-meeting.html","date":"2026-03-26","tags":["meeting"],"attendees":["염동혁","최재균"],"meetingNum":"001"}];
  // [TF-DOCS-END]

  // ── 태그 설정 ──
  const TAG_CONFIG = {
    report:  { label: 'Report',  cls: 'tag-report'  },
    idea:    { label: 'IDEA',    cls: 'tag-idea'    },
    meeting: { label: 'Meeting', cls: 'tag-meeting'  },
    kickoff: { label: 'Kickoff', cls: 'tag-kickoff'  },
    draft:   { label: 'Draft',   cls: 'tag-draft'   },
  };

  function fmtDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function isThisMonth(str) {
    const d = new Date(str);
    const now = new Date();
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }

  function footerMeta(doc) {
    if (doc.type === 'meeting') return `${fmtDate(doc.date)} · ${doc.attendees.length}인 참석`;
    if (doc.type === 'idea')    return `${fmtDate(doc.date)} · ${doc.status || 'Draft'}`;
    return `${fmtDate(doc.date)} · ${doc.slides}장`;
  }

  function renderCard(doc) {
    const tags = doc.tags.map(t => {
      const cfg = TAG_CONFIG[t] || { label: t, cls: 'tag-report' };
      return `<span class="tag ${cfg.cls}">${cfg.label}</span>`;
    }).join('');
    const newBadge = isThisMonth(doc.date) ? `<span class="tag tag-new">NEW</span>` : '';
    return `
      <a class="card" href="${doc.file}" target="_blank" data-type="${doc.type}">
        <div class="card-body">
          <div class="card-tags">${tags}${newBadge}</div>
          <div class="card-title">${doc.title}</div>
          <div class="card-desc">${doc.desc}</div>
          <div class="card-footer">
            <span class="card-date">${footerMeta(doc)}</span>
            <span class="card-cta">열기 →</span>
          </div>
        </div>
      </a>`;
  }

  function renderGrid(gridId, list, emptyMsg) {
    const el = document.getElementById(gridId);
    if (list.length === 0) {
      el.innerHTML = `<div class="empty">${emptyMsg}</div>`;
    } else {
      el.innerHTML = list.map(renderCard).join('');
    }
    return list.length;
  }

  // Sort by date descending
  const sorted = [...docs].sort((a, b) => new Date(b.date) - new Date(a.date));

  const reports  = sorted.filter(d => d.type === 'report');
  const ideas    = sorted.filter(d => d.type === 'idea');
  const meetings = sorted.filter(d => d.type === 'meeting');

  // Stats
  document.getElementById('totalCount').textContent   = docs.length;
  document.getElementById('reportCount').textContent  = reports.length;
  document.getElementById('ideaCount').textContent    = ideas.length;
  document.getElementById('meetingCount').textContent = meetings.length;

  // Render sections
  renderGrid('gridReports',  reports,  '보고서가 아직 없습니다');
  renderGrid('gridIdeas',    ideas,    '아이디어가 아직 없습니다 — 인터뷰 완료 후 추가 예정');
  renderGrid('gridMeetings', meetings, '회의록이 아직 없습니다');

  // Section counts
  document.getElementById('countReports').textContent  = reports.length  + '건';
  document.getElementById('countIdeas').textContent    = ideas.length    + '건';
  document.getElementById('countMeetings').textContent = meetings.length + '건';

  // ── Search ──
  const searchInput   = document.getElementById('searchInput');
  const searchSection = document.getElementById('searchSection');
  const searchGrid    = document.getElementById('searchGrid');
  const searchCount   = document.getElementById('searchCount');
  const sectionEls    = ['section-reports', 'section-meetings', 'section-ideas'].map(id => document.getElementById(id));

  searchInput.addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    if (!q) {
      searchSection.classList.remove('visible');
      sectionEls.forEach(el => el.classList.remove('hidden'));
      return;
    }
    sectionEls.forEach(el => el.classList.add('hidden'));
    searchSection.classList.add('visible');
    const filtered = sorted.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.desc.toLowerCase().includes(q) ||
      d.tags.some(t => t.toLowerCase().includes(q)) ||
      (d.attendees || []).some(a => a.toLowerCase().includes(q))
    );
    searchCount.textContent = filtered.length + '건';
    if (filtered.length === 0) {
      searchGrid.innerHTML = `<div class="empty">검색 결과가 없습니다</div>`;
    } else {
      searchGrid.innerHTML = filtered.map(renderCard).join('');
    }
  });

  // ── 게시판: GitHub Issues (label: board) ──
  const REPO = 'jihoabba/AI-TF';

  function timeAgo(str) {
    const diff = (Date.now() - new Date(str)) / 1000;
    if (diff < 60)   return '방금 전';
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return `${Math.floor(diff/86400)}일 전`;
  }

  function stripMd(text) {
    return (text || '')
      .replace(/```[\s\S]*?```/g, '')
      .replace(/[#*`>_~\[\]]/g, '')
      .replace(/\n+/g, ' ')
      .trim();
  }

  function renderNotes(issues) {
    const grid = document.getElementById('boardGrid');
    if (!issues.length) {
      grid.innerHTML = `<div class="board-state">아직 게시글이 없습니다.<br>위 <strong>+ 새 글 작성</strong> 버튼으로 첫 글을 남겨보세요.</div>`;
      return;
    }
    grid.innerHTML = issues.map(issue => `
      <a class="note-card" href="${issue.html_url}" target="_blank">
        <div class="note-label">📌 ${issue.labels.filter(l => l.name !== 'board').map(l => l.name).join(' · ') || 'Note'}</div>
        <div class="note-title">${issue.title}</div>
        ${issue.body ? `<div class="note-body">${stripMd(issue.body)}</div>` : ''}
        <div class="note-footer">
          <span class="note-author">
            <img src="${issue.user.avatar_url}" alt="">
            ${issue.user.login}
          </span>
          <span class="note-date">${timeAgo(issue.created_at)}</span>
        </div>
      </a>
    `).join('');
  }

  async function loadBoard() {
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/issues?labels=board&state=open&per_page=20&sort=created&direction=desc`,
        { headers: { 'Accept': 'application/vnd.github.v3+json' } }
      );
      if (!res.ok) throw new Error(res.status);
      const issues = await res.json();
      renderNotes(issues);
    } catch (e) {
      document.getElementById('boardGrid').innerHTML =
        `<div class="board-state">게시글을 불러오지 못했습니다.<br><small style="color:rgba(0,0,0,0.3)">GitHub API 오류 (${e.message})</small></div>`;
    }
  }

  loadBoard();
</script>
