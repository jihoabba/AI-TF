<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI TF — LINE FRIENDS SQUARE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text: #1d1d1f;
    --text-secondary: rgba(0,0,0,0.5);
    --accent: #0071e3;
    --green: #1d8348;
    --orange: #b95000;
    --divider: rgba(0,0,0,0.08);
    --divider-strong: rgba(0,0,0,0.14);
    --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --radius: 18px;
    --green-bg: rgba(29,131,72,0.08);
    --orange-bg: rgba(185,80,0,0.08);
    --blue-bg: rgba(0,113,227,0.07);
  }

  html {
    background: var(--bg);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body { min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: rgba(245,245,247,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--divider);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 48px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .header-sep { width: 1px; height: 14px; background: var(--divider-strong); }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .badge-live {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: var(--green-bg);
    border-radius: 100px;
    font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 0.04em;
  }
  .badge-live::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Hero ── */
  .hero { padding: 72px 48px 40px; max-width: 1200px; margin: 0 auto; }

  .hero-eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.1s;
  }
  .hero-title {
    font-size: 52px; font-weight: 700; letter-spacing: -0.03em;
    line-height: 1.05; color: var(--text); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.15s;
  }
  .hero-title span { color: var(--accent); }
  .hero-sub {
    font-size: 18px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.5; max-width: 560px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.2s;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Stats bar ── */
  .stats-bar {
    max-width: 1200px; margin: 0 auto; padding: 0 48px 44px;
    display: flex; gap: 12px; flex-wrap: wrap;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.25s;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: 100px; box-shadow: var(--shadow);
  }
  .stat-pill .num { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .stat-pill .lbl { font-size: 13px; color: var(--text-secondary); }
  .stat-pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-report  { background: var(--accent); }
  .dot-idea    { background: var(--orange); }
  .dot-meeting { background: var(--green); }

  /* ── Search ── */
  .search-wrap {
    max-width: 1200px; margin: 0 auto; padding: 0 48px 36px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.3s;
  }
  .search-box { position: relative; max-width: 480px; }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 14px; pointer-events: none; }
  .search-input {
    width: 100%; height: 44px; padding: 0 16px 0 42px;
    border: 1px solid var(--divider-strong); border-radius: 100px;
    background: var(--surface); font-size: 14px; color: var(--text);
    font-family: inherit; outline: none; transition: all 0.2s; box-shadow: var(--shadow);
  }
  .search-input::placeholder { color: var(--text-secondary); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12); }

  /* ── Section ── */
  .section { max-width: 1200px; margin: 0 auto; padding: 0 48px 64px; }

  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }

  .section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .section-count { font-size: 12px; color: rgba(0,0,0,0.28); }

  /* ── Cards grid ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1),
                box-shadow 0.2s cubic-bezier(0.4,0,0.2,1),
                border-color 0.2s;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card[data-type="report"]::before  { background: var(--accent); }
  .card[data-type="meeting"]::before { background: var(--green); }
  .card[data-type="idea"]::before    { background: var(--orange); }

  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: rgba(0,113,227,0.18); }

  .card:nth-child(1) { animation-delay: 0.35s; }
  .card:nth-child(2) { animation-delay: 0.40s; }
  .card:nth-child(3) { animation-delay: 0.45s; }
  .card:nth-child(4) { animation-delay: 0.50s; }
  .card:nth-child(5) { animation-delay: 0.55s; }

  /* Card body */
  .card-body { padding: 20px 22px 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .tag { padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
  .tag-report  { background: var(--blue-bg);   color: var(--accent); }
  .tag-idea    { background: var(--orange-bg); color: var(--orange); }
  .tag-meeting { background: var(--green-bg);  color: var(--green); }
  .tag-kickoff { background: var(--blue-bg);   color: var(--accent); }
  .tag-new     { background: rgba(0,113,227,0.1); color: var(--accent); }
  .tag-draft   { background: var(--orange-bg); color: var(--orange); }

  .card-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.3; }
  .card-desc  { font-size: 13px; color: var(--text-secondary); line-height: 1.5; flex: 1; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px solid var(--divider); margin-top: 4px;
  }
  .card-date { font-size: 12px; color: rgba(0,0,0,0.3); font-variant-numeric: tabular-nums; }
  .card-cta { font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 4px; transition: gap 0.15s; }
  .card:hover .card-cta { gap: 7px; }

  /* Empty state */
  .empty { grid-column: 1 / -1; text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 15px; }

  /* Search results view */
  .search-section { max-width: 1200px; margin: 0 auto; padding: 0 48px 64px; display: none; }
  .search-section.visible { display: block; }

  /* Hidden */
  .section.hidden { display: none; }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--divider);
    padding: 28px 48px;
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-left  { font-size: 12px; color: rgba(0,0,0,0.3); }
  .footer-right { font-size: 12px; color: rgba(0,0,0,0.3); display: flex; align-items: center; gap: 6px; }
  .footer-right a { color: var(--accent); text-decoration: none; }
  .footer-right a:hover { text-decoration: underline; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 0 24px; }
    .hero { padding: 48px 24px 32px; }
    .hero-title { font-size: 36px; }
    .hero-sub { font-size: 16px; }
    .stats-bar { padding: 0 24px 32px; }
    .search-wrap { padding: 0 24px 24px; }
    .search-box { max-width: 100%; }
    .section { padding: 0 24px 48px; }
    .search-section { padding: 0 24px 48px; }
    .cards { grid-template-columns: 1fr; }
    .footer { padding: 24px; flex-direction: column; gap: 8px; text-align: center; }
  }

  /* ── Board ── */
  .board-section { max-width: 1200px; margin: 0 auto; padding: 0 48px 72px; }

  .board-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .board-new-btn {
    margin-left: auto;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--divider-strong);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    transition: all 0.15s;
  }
  .board-new-btn:hover { border-color: var(--accent); color: var(--accent); }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-left: 3px solid #7c3aed;
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .note-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

  .note-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 100px;
    margin-bottom: 4px;
  }
  .note-label.공지      { background: rgba(0,113,227,0.1);  color: var(--accent); }
  .note-label.요청사항  { background: rgba(192,57,43,0.1);  color: #c0392b; }
  .note-label.메모      { background: rgba(0,0,0,0.06);     color: rgba(0,0,0,0.45); }
  .note-label.아이디어  { background: rgba(185,80,0,0.1);   color: var(--orange); }

  .note-card[data-cat="공지"]     { border-left-color: var(--accent); }
  .note-card[data-cat="요청사항"] { border-left-color: #c0392b; }
  .note-card[data-cat="메모"]     { border-left-color: rgba(0,0,0,0.2); }
  .note-card[data-cat="아이디어"] { border-left-color: var(--orange); }

  .note-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.4;
  }

  .note-body {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .note-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--divider);
    margin-top: 2px;
  }

  .note-author {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .note-author img {
    width: 18px;
    height: 18px;
    border-radius: 50%;
  }

  .note-date { font-size: 11px; color: rgba(0,0,0,0.28); }

  .board-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 24px;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.7;
  }

  .dot-board { background: #7c3aed; }

  /* Note card actions */
  .note-footer { cursor: default; }
  .note-actions { display: flex; align-items: center; gap: 6px; }
  .note-date { font-size: 11px; color: rgba(0,0,0,0.28); }

  .btn-icon {
    background: none; border: none; cursor: pointer; padding: 2px 5px;
    font-size: 13px; border-radius: 6px; line-height: 1;
    color: rgba(0,0,0,0.3); transition: background 0.12s, color 0.12s;
    font-family: inherit;
  }
  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-del:hover  { color: #c0392b !important; }

  /* Delete prompt (inline) */
  .del-prompt {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 10px 0 2px;
    border-top: 1px solid var(--divider);
    margin-top: 4px;
  }
  .del-prompt.show { display: flex; }
  .del-pwd-input {
    flex: 1; height: 32px; padding: 0 10px;
    border: 1px solid var(--divider-strong); border-radius: 8px;
    font-size: 13px; font-family: inherit; background: var(--bg);
    outline: none; letter-spacing: 0.2em; color: var(--text);
  }
  .del-pwd-input:focus { border-color: #c0392b; box-shadow: 0 0 0 2px rgba(192,57,43,0.12); }
  .btn-del-ok {
    height: 32px; padding: 0 12px; border-radius: 8px;
    background: #c0392b; color: #fff; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: opacity 0.12s;
  }
  .btn-del-ok:hover { opacity: 0.85; }
  .btn-del-x {
    height: 32px; padding: 0 10px; border-radius: 8px;
    background: transparent; border: 1px solid var(--divider-strong);
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    color: var(--text-secondary);
  }
  .del-err { font-size: 11px; color: #c0392b; white-space: nowrap; }

  /* Comment modal */
  .cm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    z-index: 300; align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .cm-overlay.open { display: flex; }

  .cm-panel {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    width: 100%; max-width: 640px;
    max-height: 85vh;
    display: flex; flex-direction: column;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(32px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .cm-handle {
    width: 36px; height: 4px; background: var(--divider-strong);
    border-radius: 2px; margin: 12px auto 0;
  }
  .cm-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 16px 24px 12px; border-bottom: 1px solid var(--divider);
    gap: 12px;
  }
  .cm-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; flex: 1; }
  .cm-close {
    background: none; border: none; cursor: pointer; font-size: 16px;
    color: var(--text-secondary); padding: 2px; line-height: 1;
    flex-shrink: 0;
  }
  .cm-body { padding: 16px 24px 8px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  .cm-comments { flex: 1; overflow-y: auto; padding: 8px 24px; }
  .cm-comment-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--divider);
  }
  .cm-comment-item:last-child { border-bottom: none; }
  .cm-comment-body { flex: 1; }
  .cm-comment-author { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .cm-comment-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .cm-comment-time { font-size: 11px; color: rgba(0,0,0,0.28); margin-top: 3px; }
  .btn-del-comment {
    background: none; border: none; cursor: pointer;
    font-size: 13px; color: rgba(0,0,0,0.2); padding: 2px;
    transition: color 0.12s; flex-shrink: 0; margin-top: 2px;
  }
  .btn-del-comment:hover { color: #c0392b; }
  .cm-no-comments {
    text-align: center; padding: 24px; color: var(--text-secondary);
    font-size: 13px;
  }

  .cm-form {
    padding: 12px 24px 20px; border-top: 1px solid var(--divider);
    display: flex; flex-direction: column; gap: 8px;
  }
  .cm-form-author {
    height: 36px; padding: 0 12px; border: 1px solid var(--divider-strong);
    border-radius: 8px; font-size: 13px; font-family: inherit;
    background: var(--bg); color: var(--text); outline: none;
    max-width: 180px;
  }
  .cm-form-row { display: flex; gap: 8px; }
  .cm-form-text {
    flex: 1; height: 36px; padding: 0 12px;
    border: 1px solid var(--divider-strong); border-radius: 8px;
    font-size: 13px; font-family: inherit; background: var(--bg);
    color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .cm-form-text:focus, .cm-form-author:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,113,227,0.1);
  }
  .btn-cm-submit {
    height: 36px; padding: 0 16px; border-radius: 8px;
    background: #7c3aed; color: #fff; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity 0.12s; white-space: nowrap;
  }
  .btn-cm-submit:hover { opacity: 0.85; }

  @media (max-width: 768px) {
    .board-section { padding: 0 24px 48px; }
    .board-grid { grid-template-columns: 1fr; }
    .cm-panel { max-height: 90vh; }
  }

  /* ── Write Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 480px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.2s ease;
  }

  .modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
  .field input, .field textarea, .field select {
    padding: 10px 14px;
    border: 1px solid var(--divider-strong);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    resize: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .field textarea { min-height: 100px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel {
    padding: 9px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    border: 1px solid var(--divider-strong); background: transparent;
    color: var(--text-secondary); cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--bg); }
  .btn-submit {
    padding: 9px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    border: none; background: var(--accent); color: #fff; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s;
  }
  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }

  .submit-msg { font-size: 13px; color: var(--green); font-weight: 600; text-align: center; display: none; }
  .submit-msg.show { display: block; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">LINE FRIENDS SQUARE</span>
    <div class="header-sep"></div>
    <span class="header-title">AI TF 아카이브</span>
  </div>
  <div class="header-right">
    <div class="badge-live">2026 Q2 진행중</div>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <div class="hero-eyebrow">AI Transformation Task Force</div>
  <h1 class="hero-title">산출물 <span>아카이브</span></h1>
  <p class="hero-sub">보고서, 목업, 회의록을 한 곳에서 관리합니다</p>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-pill">
    <span class="num" id="totalCount">—</span>
    <span class="lbl">총 문서</span>
  </div>
  <div class="stat-pill">
    <div class="dot dot-report"></div>
    <span class="num" id="reportCount">—</span>
    <span class="lbl">보고서</span>
  </div>
  <div class="stat-pill">
    <div class="dot dot-idea"></div>
    <span class="num" id="ideaCount">—</span>
    <span class="lbl">아이디어</span>
  </div>
  <div class="stat-pill">
    <div class="dot dot-meeting"></div>
    <span class="num" id="meetingCount">—</span>
    <span class="lbl">회의록</span>
  </div>
</div>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="문서 검색..." autocomplete="off">
  </div>
</div>

<!-- Search Results (shown only when searching) -->
<div class="search-section" id="searchSection">
  <div class="section-header">
    <span class="section-title">검색 결과</span>
    <span class="section-count" id="searchCount"></span>
  </div>
  <div class="cards" id="searchGrid"></div>
</div>

<!-- Section: 보고 자료 -->
<main class="section" id="section-reports">
  <div class="section-header">
    <div class="section-dot dot-report"></div>
    <span class="section-title">보고 자료</span>
    <span class="section-count" id="countReports"></span>
  </div>
  <div class="cards" id="gridReports"></div>
</main>

<!-- Section: 회의록 -->
<main class="section" id="section-meetings">
  <div class="section-header">
    <div class="section-dot dot-meeting"></div>
    <span class="section-title">회의록</span>
    <span class="section-count" id="countMeetings"></span>
  </div>
  <div class="cards" id="gridMeetings"></div>
</main>

<!-- Section: IDEA -->
<main class="section" id="section-ideas">
  <div class="section-header">
    <div class="section-dot dot-idea"></div>
    <span class="section-title">IDEA</span>
    <span class="section-count" id="countIdeas"></span>
  </div>
  <div class="cards" id="gridIdeas"></div>
</main>

<!-- Board -->
<section class="board-section">
  <div class="board-header">
    <div class="section-dot dot-board"></div>
    <span class="section-title">게시판</span>
    <button class="board-new-btn" onclick="openModal()">+ 새 글 작성</button>
  </div>
  <div class="board-grid" id="boardGrid">
    <div class="board-state">불러오는 중…</div>
  </div>
</section>

<!-- Comment Modal -->
<div class="cm-overlay" id="cmOverlay" onclick="handleCmOverlayClick(event)">
  <div class="cm-panel">
    <div class="cm-handle"></div>
    <div class="cm-header">
      <div class="cm-title" id="cmTitle"></div>
      <button class="cm-close" onclick="closeComments()">✕</button>
    </div>
    <div class="cm-body" id="cmBody"></div>
    <div class="cm-comments" id="cmComments"></div>
    <div class="cm-form">
      <input class="cm-form-author" type="text" id="cAuthor" placeholder="이름 (선택)">
      <div class="cm-form-row">
        <input class="cm-form-text" type="text" id="cText" placeholder="댓글을 입력하세요" onkeydown="if(event.key==='Enter')addComment()">
        <button class="btn-cm-submit" onclick="addComment()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- Write Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">새 글 작성</div>
    <div class="field">
      <label>제목</label>
      <input type="text" id="fTitle" placeholder="글 제목" maxlength="100">
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="fContent" placeholder="내용을 입력하세요"></textarea>
    </div>
    <div class="field">
      <label>카테고리</label>
      <select id="fCategory">
        <option value="메모">메모</option>
        <option value="공지">공지</option>
        <option value="요청사항">요청사항</option>
        <option value="아이디어">아이디어</option>
      </select>
    </div>
    <div class="field">
      <label>작성자</label>
      <input type="text" id="fAuthor" placeholder="이름">
    </div>
    <div class="field">
      <label>삭제 비밀번호 <span style="font-weight:400;text-transform:none;letter-spacing:0">(선택 · 숫자 4자리)</span></label>
      <input type="password" id="fPassword" placeholder="설정 안 하면 마스터만 삭제 가능" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>
    <div class="submit-msg" id="submitMsg">✓ 게시글이 등록됐습니다!</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-submit" id="btnSubmit" onclick="submitPost()">등록</button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="footer-left">LINE FRIENDS SQUARE AI TF &nbsp;·&nbsp; 2026 Q2</div>
  <div class="footer-right">
    GitHub Pages로 배포 &nbsp;·&nbsp;
    <a href="https://github.com/jihoabba/AI-TF" target="_blank">repo →</a>
  </div>
</footer>

  // ── 태그 설정 ──
  const TAG_CONFIG = {
    report:  { label: 'Report',  cls: 'tag-report'  },
    idea:    { label: 'IDEA',    cls: 'tag-idea'    },
    meeting: { label: 'Meeting', cls: 'tag-meeting'  },

  };

  function fmtDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function isThisMonth(str) {
    const d = new Date(str);
    const now = new Date();
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }

  function footerMeta(doc) {
    if (doc.type === 'meeting') return `${fmtDate(doc.date)} · ${doc.attendees.length}인 참석`;
    if (doc.type === 'idea')    return `${fmtDate(doc.date)} · ${doc.status || 'Draft'}`;
    return `${fmtDate(doc.date)} · ${doc.slides}장`;
  }

  function renderCard(doc) {
    const tags = doc.tags.map(t => {
      const cfg = TAG_CONFIG[t] || { label: t, cls: 'tag-report' };
      return `<span class="tag ${cfg.cls}">${cfg.label}</span>`;
    }).join('');
    const newBadge = isThisMonth(doc.date) ? `<span class="tag tag-new">NEW</span>` : '';
    return `
      <a class="card" href="${doc.file}" target="_blank" data-type="${doc.type}">
        <div class="card-body">
          <div class="card-tags">${tags}${newBadge}</div>
          <div class="card-title">${doc.title}</div>
          <div class="card-desc">${doc.desc}</div>
          <div class="card-footer">
            <span class="card-date">${footerMeta(doc)}</span>
            <span class="card-cta">열기 →</span>
          </div>
        </div>
      </a>`;
  }

  function renderGrid(gridId, list, emptyMsg) {
    const el = document.getElementById(gridId);
    if (list.length === 0) {
      el.innerHTML = `<div class="empty">${emptyMsg}</div>`;
    } else {
      el.innerHTML = list.map(renderCard).join('');
    }
    return list.length;
  }

  document.getElementById('totalCount').textContent   = docs.length;

  // Render sections
  renderGrid('gridReports',  reports,  '보고서가 아직 없습니다');
  renderGrid('gridIdeas',    ideas,    '아이디어가 아직 없습니다 — 인터뷰 완료 후 추가 예정');
  renderGrid('gridMeetings', meetings, '회의록이 아직 없습니다');

  // Section counts
  document.getElementById('countReports').textContent  = reports.length  + '건';
  document.getElementById('countIdeas').textContent    = ideas.length    + '건';

  // ── Search ──
  const searchInput   = document.getElementById('searchInput');

  searchInput.addEventListener('input', function () {

    if (!q) {
      searchSection.classList.remove('visible');
      sectionEls.forEach(el => el.classList.remove('hidden'));
      return;
    }
    sectionEls.forEach(el => el.classList.add('hidden'));
    searchSection.classList.add('visible');
    const filtered = sorted.filter(d =>
      d.title.toLowerCase().includes(q) ||

      d.tags.some(t => t.toLowerCase().includes(q)) ||
      (d.attendees || []).some(a => a.toLowerCase().includes(q))
    );
    searchCount.textContent = filtered.length + '건';
    if (filtered.length === 0) {
      searchGrid.innerHTML = `<div class="empty">검색 결과가 없습니다</div>`;
    } else {
      searchGrid.innerHTML = filtered.map(renderCard).join('');

    if (diff < 60)    return '방금 전';
    if (diff < 3600)  return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return `${Math.floor(diff/86400)}일 전`;

  function renderNotes(posts) {
    const grid = document.getElementById('boardGrid');
    if (!posts.length) {
      grid.innerHTML = `<div class="board-state">아직 게시글이 없습니다.<br><strong>+ 새 글 작성</strong>으로 첫 글을 남겨보세요.</div>`;
      return;

        <div class="note-title">${p.title}</div>
        ${p.content ? `<div class="note-body">${p.content}</div>` : ''}
        <div class="note-footer">
          <span class="note-author">${p.author || '—'}</span>
          <div class="note-actions">

  function escHtml(s) { return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

  async function loadBoard() {
    const { data, error } = await sb
      .from('posts').select('*').order('created_at', { ascending: false });
    if (error) {
      document.getElementById('boardGrid').innerHTML =
        `<div class="board-state">게시글을 불러오지 못했습니다.<br><small style="color:rgba(0,0,0,0.3)">${error.message}</small></div>`;
      return;

    renderNotes(data);

  // 삭제
  function showDelPrompt(id) {
    document.getElementById(`del-${id}`).classList.add('show');
    document.getElementById(`pwd-${id}`).focus();
  }
  function hideDelPrompt(id) {
    document.getElementById(`del-${id}`).classList.remove('show');
    document.getElementById(`pwd-${id}`).value = '';
    document.getElementById(`derr-${id}`).textContent = '';
  }
  async function confirmDelete(id) {
    const entered = document.getElementById(`pwd-${id}`).value;
    const { data } = await sb.from('posts').select('password').eq('id', id).single();
    const stored = data?.password || '';
    if (entered !== MASTER_PWD && entered !== stored) {
      document.getElementById(`derr-${id}`).textContent = '비밀번호가 틀렸습니다';
      document.getElementById(`pwd-${id}`).value = '';
      return;

    await sb.from('posts').delete().eq('id', id);
    // realtime이 자동 갱신
  }

  // 실시간 구독
  sb.channel('posts-ch')

    .subscribe();

  loadBoard();

  // ── 글쓰기 모달 ──
  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fTitle').focus();
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('submitMsg').classList.remove('show');
    document.getElementById('fTitle').value = '';
    document.getElementById('fContent').value = '';
    document.getElementById('fAuthor').value = '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fCategory').value = '메모';
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('btnSubmit').textContent = '등록';
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  async function submitPost() {
    const title    = document.getElementById('fTitle').value.trim();
    const content  = document.getElementById('fContent').value.trim();
    const category = document.getElementById('fCategory').value;
    const author   = document.getElementById('fAuthor').value.trim();
    const password = document.getElementById('fPassword').value.trim() || null;
    if (!title) { document.getElementById('fTitle').focus(); return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true; btn.textContent = '등록 중…';

    const { error } = await sb.from('posts').insert([{ title, content, category, author, password }]);
    btn.textContent = '등록';
    if (error) { alert('오류: ' + error.message); btn.disabled = false; return; }
    document.getElementById('submitMsg').classList.add('show');
    setTimeout(closeModal, 1200);
  }

  // ── 댓글 모달 ──
  function openComments(postId, title, body) {
    activePostId = postId;
    document.getElementById('cmTitle').textContent = title;
    document.getElementById('cmBody').textContent  = body;
    document.getElementById('cmBody').style.display = body ? '' : 'none';
    document.getElementById('cmOverlay').classList.add('open');
    loadComments();
    // 실시간 댓글 구독
    sb.channel('comments-ch-' + postId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'comments',
          filter: `post_id=eq.${postId}` }, () => loadComments())
      .subscribe();
  }
  function closeComments() {
    document.getElementById('cmOverlay').classList.remove('open');
    document.getElementById('cAuthor').value = '';
    document.getElementById('cText').value = '';
    sb.channel('comments-ch-' + activePostId)?.unsubscribe();
    activePostId = null;
  }
  function handleCmOverlayClick(e) {
    if (e.target === document.getElementById('cmOverlay')) closeComments();
  }

  async function loadComments() {
    if (!activePostId) return;
    const { data } = await sb.from('comments').select('*')
      .eq('post_id', activePostId).order('created_at');
    const el = document.getElementById('cmComments');
    if (!data || !data.length) {
      el.innerHTML = `<div class="cm-no-comments">아직 댓글이 없습니다</div>`;
      return;
    }
    el.innerHTML = data.map(c => `
      <div class="cm-comment-item">
        <div class="cm-comment-body">
          <div class="cm-comment-author">${c.author || '익명'}</div>
          <div class="cm-comment-text">${c.content}</div>
          <div class="cm-comment-time">${timeAgo(c.created_at)}</div>
        </div>
        <button class="btn-del-comment" title="삭제" onclick="deleteComment('${c.id}')">✕</button>
      </div>
    `).join('');
  }

  async function addComment() {
    const content = document.getElementById('cText').value.trim();
    const author  = document.getElementById('cAuthor').value.trim();
    if (!content || !activePostId) return;
    document.getElementById('cText').value = '';
    await sb.from('comments').insert([{ post_id: activePostId, content, author }]);
  }

  async function deleteComment(id) {
    await sb.from('comments').delete().eq('id', id);
  }
</script>
