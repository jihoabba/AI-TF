<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B 발주 카탈로그 생성기</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: #ffffff; --text: #1d1d1f;
  --muted: rgba(0,0,0,0.45); --accent: #0071e3;
  --green: #1a7f4b; --divider: rgba(0,0,0,0.08);
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
html { background: var(--bg); font-family: -apple-system,"SF Pro Text","Helvetica Neue",sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.6; }

.topnav { height: 52px; background: rgba(245,245,247,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 0 40px; gap: 12px; }
.nav-back { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
.nav-back:hover { opacity: 0.75; }
.nav-sep { width: 1px; height: 14px; background: var(--divider); }
.nav-title { font-size: 13px; font-weight: 500; color: var(--muted); }

.page { max-width: 560px; margin: 0 auto; padding: 56px 24px 96px; }

.eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 10px; }
.subtitle { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 36px; }

.card { background: var(--surface); border: 1px solid var(--divider); border-radius: 18px; padding: 32px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 20px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.field input { height: 42px; border: 1.5px solid var(--divider); border-radius: 10px; padding: 0 14px; font-size: 15px; color: var(--text); outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: rgba(0,0,0,0.25); }

.dropzone { border: 2px dashed var(--divider); border-radius: 14px; padding: 36px 24px; text-align: center; cursor: pointer; transition: all .2s; background: var(--bg); }
.dropzone:hover, .dropzone.drag-over { border-color: var(--accent); background: rgba(0,113,227,0.04); }
.dropzone.uploaded { border-style: solid; border-color: var(--green); background: rgba(26,127,75,0.04); }
.drop-icon { font-size: 36px; margin-bottom: 12px; }
.drop-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.drop-hint { font-size: 12px; color: var(--muted); }

.parsed-badge { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--green); background: rgba(26,127,75,0.08); border: 1px solid rgba(26,127,75,0.15); border-radius: 10px; padding: 12px 16px; }

.btn-primary { height: 48px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { background: var(--divider); color: var(--muted); cursor: not-allowed; }

/* success */
.success-card { text-align: center; }
.success-icon { font-size: 48px; margin-bottom: 8px; }
.success-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.success-card p { color: var(--muted); margin-bottom: 24px; }

.link-box { background: var(--bg); border: 1px solid var(--divider); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.link-text { font-size: 12px; color: var(--muted); font-family: monospace; flex: 1; word-break: break-all; text-align: left; }
.btn-copy { flex-shrink: 0; height: 32px; padding: 0 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-copy:hover { opacity: 0.85; }
.btn-copy.copied { background: var(--green); }

.btn-row { display: flex; flex-direction: column; gap: 10px; }
.btn-open { height: 48px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-open:hover { opacity: 0.85; }
.btn-reset { height: 42px; background: transparent; color: var(--muted); border: 1px solid var(--divider); border-radius: 12px; font-size: 14px; cursor: pointer; }
.btn-reset:hover { border-color: var(--text); color: var(--text); }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .topnav { padding: 0 20px; }
  .page { padding: 32px 16px 72px; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-back" href="../index.html">← 아카이브</a>
  <div class="nav-sep"></div>
  <span class="nav-title">B2B 발주 카탈로그 생성기</span>
</nav>

<div class="page">
  <div class="eyebrow">Internal · B2B팀 전용</div>
  <h1>발주 카탈로그 생성</h1>
  <p class="subtitle">SAP 엑셀을 업로드하면 파트너사가 접속할 수 있는<br>이미지 카탈로그 링크를 자동으로 만들어드립니다.</p>

  <div class="card" id="upload-card">
    <div class="field">
      <label>세션 이름 (선택)</label>
      <input type="text" id="label-input" placeholder="예: 아박 미팅 2026-04-10">
    </div>

    <div class="dropzone" id="dropzone">
      <div class="drop-icon">📊</div>
      <div class="drop-text" id="drop-text">엑셀 파일을 여기에 드래그하거나 클릭</div>
      <div class="drop-hint">IPX 발주가능제품리스트_*.xlsx</div>
      <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
    </div>

    <div id="parsed-badge" class="parsed-badge" style="display:none;">
      ✅ <span id="product-count"></span>개 상품 파싱 완료 — 카탈로그를 생성할 수 있습니다.
    </div>

    <button class="btn-primary" id="create-btn" disabled onclick="createSession()">
      카탈로그 링크 생성
    </button>
  </div>

  <div class="card success-card" id="success-card" style="display:none;">
    <div class="success-icon">🎉</div>
    <h2>카탈로그 생성 완료!</h2>
    <p>아래 링크를 파트너사에 전달하세요.</p>
    <div class="link-box">
      <span class="link-text" id="catalog-url-text"></span>
      <button class="btn-copy" id="copy-btn" onclick="copyLink()">복사</button>
    </div>
    <div class="btn-row">
      <button class="btn-open" onclick="openCatalog()">카탈로그 바로 열기 →</button>
      <button class="btn-reset" onclick="resetPage()">새 카탈로그 만들기</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://pflsamjncryfeyhmhxjh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmbHNhbWpuY3J5ZmV5aG1oeGpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTk3MDAsImV4cCI6MjA5MDE3NTcwMH0.kT1TWTEnZ7Yb7ygw4mpQQRcCKt4iryhvv9xKxcEqROE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let parsedProducts = null;
let catalogUrl = '';

// Dropzone setup
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets['재고현황'];
      if (!ws) { alert('재고현황 시트를 찾을 수 없습니다. 올바른 파일인지 확인해주세요.'); return; }

      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      // 헤더: 행3(index 2), 데이터: 행4+
      parsedProducts = rows.slice(3)
        .filter(r => r[0] && String(r[0]).trim().length >= 10)
        .map(r => ({
          code:   String(r[0]).trim(),
          name:   String(r[1] || '').trim(),
          cat1:   String(r[2] || '').trim(),
          cat2:   String(r[3] || '').trim(),
          char1:  String(r[4] || '').trim(),
          char2:  String(r[5] || '').trim(),
          stock:  typeof r[6] === 'number' ? r[6] : null,
          retail: typeof r[7] === 'number' ? r[7] : 0,
          supply: typeof r[8] === 'number' ? r[8] : 0,
        }));

      document.getElementById('product-count').textContent = parsedProducts.length.toLocaleString();
      document.getElementById('parsed-badge').style.display = 'flex';
      document.getElementById('create-btn').disabled = false;
      dropzone.classList.add('uploaded');
      document.getElementById('drop-text').textContent = file.name;
    } catch(err) {
      alert('파일 파싱 중 오류가 발생했습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function createSession() {
  const label = document.getElementById('label-input').value.trim()
    || `발주 카탈로그 ${new Date().toLocaleDateString('ko-KR')}`;
  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>저장 중...';

  const { data, error } = await sb
    .from('b2b_order_sessions')
    .insert({ label, products: parsedProducts })
    .select('id')
    .single();

  if (error) {
    alert('저장 실패: ' + error.message);
    btn.disabled = false;
    btn.textContent = '카탈로그 링크 생성';
    return;
  }

  const base = window.location.href.split('?')[0].replace('b2b-order-upload.html', 'b2b-order-catalog.html');
  catalogUrl = base + '?id=' + data.id;

  document.getElementById('catalog-url-text').textContent = catalogUrl;
  document.getElementById('upload-card').style.display = 'none';
  document.getElementById('success-card').style.display = 'flex';
}

function copyLink() {
  navigator.clipboard.writeText(catalogUrl).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  });
}

function openCatalog() { window.open(catalogUrl); }

function resetPage() {
  parsedProducts = null;
  catalogUrl = '';
  document.getElementById('label-input').value = '';
  document.getElementById('parsed-badge').style.display = 'none';
  document.getElementById('create-btn').disabled = true;
  document.getElementById('create-btn').textContent = '카탈로그 링크 생성';
  dropzone.classList.remove('uploaded');
  document.getElementById('drop-text').textContent = '엑셀 파일을 여기에 드래그하거나 클릭';
  fileInput.value = '';
  document.getElementById('upload-card').style.display = 'flex';
  document.getElementById('success-card').style.display = 'none';
}
</script>
</body>
</html>
