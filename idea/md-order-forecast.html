<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD 발주 추천</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: #fff; --text: #1d1d1f;
  --muted: rgba(0,0,0,0.45); --accent: #0071e3;
  --green: #1a7f4b; --red: #c0392b; --orange: #b95000; --yellow: #8a6d00;
  --divider: rgba(0,0,0,0.08); --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
html { background: var(--bg); font-family: -apple-system,"SF Pro Text","Helvetica Neue",sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; font-size: 14px; }

/* nav */
.topnav { height: 52px; background: rgba(245,245,247,.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 0 40px; gap: 12px; }
.nav-back { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
.nav-back:hover { opacity: .75; }
.nav-sep { width: 1px; height: 14px; background: var(--divider); }
.nav-title { font-size: 13px; font-weight: 500; color: var(--muted); }

.page { max-width: 1100px; margin: 0 auto; padding: 48px 24px 96px; }

/* upload */
.eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
h1 { font-size: 30px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
.subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
.upload-card { background: var(--surface); border: 1px solid var(--divider); border-radius: 18px; padding: 32px; box-shadow: var(--shadow); max-width: 560px; }
.dropzone { border: 2px dashed var(--divider); border-radius: 14px; padding: 36px 24px; text-align: center; cursor: pointer; transition: all .2s; background: var(--bg); }
.dropzone:hover, .dropzone.drag-over { border-color: var(--accent); background: rgba(0,113,227,.04); }
.dropzone.uploaded { border-style: solid; border-color: var(--green); background: rgba(26,127,75,.04); }
.drop-icon { font-size: 36px; margin-bottom: 12px; }
.drop-text { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.drop-hint { font-size: 12px; color: var(--muted); }
.file-info { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--green); background: rgba(26,127,75,.08); border: 1px solid rgba(26,127,75,.15); border-radius: 10px; padding: 12px 16px; margin-top: 16px; }

/* controls */
.controls { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
.btn-primary { height: 42px; padding: 0 22px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { background: var(--divider); color: var(--muted); cursor: not-allowed; }
.btn-secondary { height: 42px; padding: 0 18px; background: transparent; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-secondary:hover { background: rgba(0,113,227,.06); }

/* report */
#report { display: none; }
.report-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
.report-title { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
.report-meta { font-size: 13px; color: var(--muted); }

/* stat row */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border: 1px solid var(--divider); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow); }
.stat-label { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -.02em; color: var(--text); }
.stat-value .unit { font-size: 14px; font-weight: 500; color: var(--muted); margin-left: 4px; }

/* section */
.section { margin-bottom: 36px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

/* filter */
.filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.filter-select { height: 36px; border: 1.5px solid var(--divider); border-radius: 10px; padding: 0 14px; font-size: 13px; color: var(--text); background: var(--surface); outline: none; cursor: pointer; transition: border-color .15s; }
.filter-select:focus { border-color: var(--accent); }

/* data table */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: right; padding: 8px 12px; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 1.5px solid var(--divider); white-space: nowrap; }
thead th.left { text-align: left; }
tbody tr { border-bottom: 1px solid var(--divider); transition: background .1s; }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 9px 12px; text-align: right; white-space: nowrap; }
tbody td.left { text-align: left; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* recommendation badge */
.rec-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.rec-urgent { background: rgba(192,57,43,.1); color: var(--red); }
.rec-order  { background: rgba(185,80,0,.1); color: var(--orange); }
.rec-monitor { background: rgba(138,109,0,.1); color: var(--yellow); }
.rec-ok     { background: rgba(26,127,75,.1); color: var(--green); }

/* parse status */
.parse-status { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.6; }
.parse-status .ok { color: var(--green); font-weight: 600; }
.parse-status .fail { color: var(--red); font-weight: 600; }

@media (max-width: 640px) {
  .topnav { padding: 0 20px; }
  .page { padding: 28px 16px 72px; }
  .stat-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>


<nav class="topnav" style="">
  <a class="nav-back" href="../index.html" >← AI DESK</a>
  <div class="nav-sep"></div>
  <span class="nav-title">MD 발주 추천</span>
</nav>

<div class="page">
  <div id="upload-section">
    <div class="eyebrow">Internal · MD팀 전용</div>
    <h1>발주 추천</h1>
    <p class="subtitle">YTD 실적, Fcst, 단가(Aging) 시트가 포함된 엑셀을 업로드하면 IP별 발주 추천을 자동 생성합니다.</p>

    <div class="upload-card">
      <div class="dropzone" id="dropzone">
        <div class="drop-icon">📋</div>
        <div class="drop-text" id="drop-text">통합 엑셀 업로드</div>
        <div class="drop-hint">YTD raw + Fcst raw + 단가(Aging) 시트 포함 (*.xlsx)</div>
        <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
      </div>
      <div id="file-info" class="file-info" style="display:none;"></div>
      <div id="parse-status" class="parse-status" style="display:none;"></div>
      <div class="controls">
        <button class="btn-primary" id="gen-btn" disabled onclick="analyze()">분석 시작</button>
        <button class="btn-secondary" id="reset-btn" style="display:none;" onclick="resetUpload()">파일 변경</button>
      </div>
    </div>
  </div>

  <!-- Report -->
  <div id="report">
    <div class="report-header">
      <div>
        <div class="report-title">IP별 발주 추천</div>
        <div class="report-meta" id="report-meta"></div>
      </div>
      <button class="btn-secondary" onclick="resetUpload()">↑ 파일 변경</button>
    </div>

    <!-- KPI Cards -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">분석 IP 수</div>
        <div class="stat-value" id="kpi-ip">--<span class="unit">IP</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">평균 월 판매량</div>
        <div class="stat-value" id="kpi-avg">--<span class="unit">EA</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">재고 소진 예상 개월</div>
        <div class="stat-value" id="kpi-months">--<span class="unit">개월</span></div>
      </div>
    </div>

    <!-- Filter + Table -->
    <div class="section">
      <div class="filter-row">
        <select class="filter-select" id="ip-filter" onchange="renderTable()">
          <option value="">전체 IP</option>
        </select>
      </div>
      <div class="tbl-wrap">
        <table id="tbl-main">
          <thead><tr>
            <th class="left">IP(대)</th>
            <th>월평균 판매량</th>
            <th>현재 재고</th>
            <th>소진 예상 개월</th>
            <th>Fcst 발주량</th>
            <th class="left">추천</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
/* ---- state ---- */
let ipData = []; // aggregated per IP

function num(v) { return typeof v === 'number' ? v : (parseFloat(v) || 0); }
function fmtN(n) { return n.toLocaleString('ko-KR'); }

/* ---- dropzone ---- */
const dz = document.getElementById('dropzone');
const fi = document.getElementById('file-input');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file) return;
  document.getElementById('drop-text').textContent = file.name;
  document.getElementById('file-info').style.display = 'flex';
  document.getElementById('file-info').textContent = `${file.name}  (${(file.size/1024).toFixed(0)} KB)`;
  dz.classList.add('uploaded');
  document.getElementById('gen-btn').disabled = false;
  window._file = file;
}

function resetUpload() {
  document.getElementById('report').style.display = 'none';
  document.getElementById('upload-section').style.display = '';
  document.getElementById('drop-text').textContent = '통합 엑셀 업로드';
  dz.classList.remove('uploaded');
  document.getElementById('file-info').style.display = 'none';
  document.getElementById('parse-status').style.display = 'none';
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('reset-btn').style.display = 'none';
  fi.value = '';
  window._file = null;
  ipData = [];
}

/* ---- analyze ---- */
function analyze() {
  const file = window._file;
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const status = [];

    // 1. YTD raw sheet
    const ytdSheet = wb.SheetNames.find(n => n.toLowerCase().includes('ytd'));
    // 2. Fcst raw sheet
    const fcstSheet = wb.SheetNames.find(n => n.toLowerCase().includes('fcst'));
    // 3. 단가(Aging) sheet
    const agingSheet = wb.SheetNames.find(n => n.includes('단가') || n.includes('Aging'));

    status.push(ytdSheet ? `<span class="ok">YTD raw: ${ytdSheet}</span>` : '<span class="fail">YTD raw: 시트 없음</span>');
    status.push(fcstSheet ? `<span class="ok">Fcst raw: ${fcstSheet}</span>` : '<span class="fail">Fcst raw: 시트 없음</span>');
    status.push(agingSheet ? `<span class="ok">단가(Aging): ${agingSheet}</span>` : '<span class="fail">단가(Aging): 시트 없음</span>');

    document.getElementById('parse-status').style.display = '';
    document.getElementById('parse-status').innerHTML = status.join('<br>');

    if (!ytdSheet || !agingSheet) {
      alert('필수 시트(YTD raw, 단가(Aging))를 찾을 수 없습니다.');
      return;
    }

    // Parse YTD raw
    const ytdRaw = XLSX.utils.sheet_to_json(wb.Sheets[ytdSheet], { header: 1 });
    // Parse Fcst raw (headers on row 2, index 1)
    const fcstRaw = fcstSheet ? XLSX.utils.sheet_to_json(wb.Sheets[fcstSheet], { header: 1 }) : [];
    // Parse Aging
    const agingRaw = XLSX.utils.sheet_to_json(wb.Sheets[agingSheet], { header: 1 });

    processData(ytdRaw, fcstRaw, agingRaw);
    buildReport();
  };
  reader.readAsArrayBuffer(file);
}

function processData(ytdRaw, fcstRaw, agingRaw) {
  // --- YTD: monthly sales by IP(대) ---
  // col 68: 월, col 57: IP(대), col 39: 청구수량, col 46: 대금청구금액
  const ytdByIp = {}; // { ip: { months: Set, totalQty: n } }
  for (let i = 1; i < ytdRaw.length; i++) {
    const r = ytdRaw[i];
    if (!r) continue;
    const ip = r[57];
    if (!ip) continue;
    const month = r[68];
    const qty = num(r[39]);
    if (!ytdByIp[ip]) ytdByIp[ip] = { months: new Set(), totalQty: 0 };
    if (month) ytdByIp[ip].months.add(month);
    ytdByIp[ip].totalQty += qty;
  }

  // --- Fcst: sum 수량 by IP ---
  // Fcst headers on row 2 (index 1). Find column indices by header name.
  const fcstByIp = {};
  if (fcstRaw.length > 1) {
    // Find header row (index 1)
    const hdr = fcstRaw[1] || fcstRaw[0];
    let colIP = -1, colQty = -1;
    for (let c = 0; c < (hdr ? hdr.length : 0); c++) {
      const h = String(hdr[c] || '').trim();
      if (h === 'IP' || h.includes('IP')) colIP = c;
      if (h === '수량' || h.includes('수량')) colQty = c;
    }
    const startRow = (fcstRaw[1] && colIP >= 0) ? 2 : 1;
    for (let i = startRow; i < fcstRaw.length; i++) {
      const r = fcstRaw[i];
      if (!r) continue;
      const ip = colIP >= 0 ? r[colIP] : '';
      const qty = colQty >= 0 ? num(r[colQty]) : 0;
      if (!ip) continue;
      fcstByIp[ip] = (fcstByIp[ip] || 0) + qty;
    }
  }

  // --- Aging: current inventory by IP ---
  // col 7: 자재코드, col 8: 자재명, col 11: IP(대), col 22: Total 수량
  const invByIp = {};
  for (let i = 1; i < agingRaw.length; i++) {
    const r = agingRaw[i];
    if (!r || !r[7]) continue;
    const ip = r[11] || '';
    const qty = num(r[22]);
    if (!ip) continue;
    invByIp[ip] = (invByIp[ip] || 0) + qty;
  }

  // --- Merge into ipData ---
  const allIps = new Set([...Object.keys(ytdByIp), ...Object.keys(invByIp)]);
  ipData = [];
  allIps.forEach(ip => {
    const ytd = ytdByIp[ip];
    const monthCount = ytd ? Math.max(ytd.months.size, 1) : 1;
    const avgMonthly = ytd ? Math.round(ytd.totalQty / monthCount) : 0;
    const currentInv = invByIp[ip] || 0;
    const burnMonths = avgMonthly > 0 ? currentInv / avgMonthly : (currentInv > 0 ? 999 : 0);
    const fcstQty = fcstByIp[ip] || 0;

    let rec = '', cls = '';
    if (burnMonths < 1) { rec = '긴급 발주 필요'; cls = 'rec-urgent'; }
    else if (burnMonths < 2) { rec = '발주 권장'; cls = 'rec-order'; }
    else if (burnMonths < 3) { rec = '모니터링'; cls = 'rec-monitor'; }
    else { rec = '적정'; cls = 'rec-ok'; }

    ipData.push({ ip, avgMonthly, currentInv, burnMonths, fcstQty, rec, cls });
  });

  ipData.sort((a, b) => a.burnMonths - b.burnMonths);
}

function buildReport() {
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('report').style.display = '';
  document.getElementById('reset-btn').style.display = '';

  const today = new Date();
  document.getElementById('report-meta').textContent = `${ipData.length}개 IP · ${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')} 기준`;

  // KPIs
  const totalIp = ipData.length;
  const totalAvg = ipData.reduce((s, r) => s + r.avgMonthly, 0);
  const avgPerIp = totalIp > 0 ? Math.round(totalAvg / totalIp) : 0;
  const totalInv = ipData.reduce((s, r) => s + r.currentInv, 0);
  const totalMonthlyAll = ipData.reduce((s, r) => s + r.avgMonthly, 0);
  const overallBurn = totalMonthlyAll > 0 ? (totalInv / totalMonthlyAll) : 0;

  document.getElementById('kpi-ip').innerHTML = `${fmtN(totalIp)}<span class="unit">IP</span>`;
  document.getElementById('kpi-avg').innerHTML = `${fmtN(avgPerIp)}<span class="unit">EA</span>`;
  document.getElementById('kpi-months').innerHTML = `${overallBurn.toFixed(1)}<span class="unit">개월</span>`;

  // IP filter
  const ips = ipData.map(r => r.ip).sort();
  const sel = document.getElementById('ip-filter');
  sel.innerHTML = '<option value="">전체 IP</option>' + ips.map(ip => `<option value="${ip}">${ip}</option>`).join('');

  renderTable();
}

function renderTable() {
  const filterIp = document.getElementById('ip-filter').value;
  let data = filterIp ? ipData.filter(r => r.ip === filterIp) : [...ipData];

  const tbody = document.querySelector('#tbl-main tbody');
  tbody.innerHTML = data.map(r => {
    const burnDisplay = r.burnMonths >= 999 ? '-' : r.burnMonths.toFixed(1);
    return `<tr>
      <td class="left">${r.ip}</td>
      <td>${fmtN(r.avgMonthly)}</td>
      <td>${fmtN(r.currentInv)}</td>
      <td>${burnDisplay}</td>
      <td>${fmtN(r.fcstQty)}</td>
      <td class="left"><span class="rec-badge ${r.cls}">${r.rec}</span></td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
