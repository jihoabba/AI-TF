<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마케팅 광고 대시보드</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: #fff; --text: #1d1d1f;
  --muted: rgba(0,0,0,0.45); --accent: #0071e3;
  --green: #1a7f4b; --red: #c0392b;
  --divider: rgba(0,0,0,0.08); --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
html { background: var(--bg); font-family: -apple-system,"SF Pro Text","Helvetica Neue",sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; font-size: 14px; }

.topnav { height: 52px; background: rgba(245,245,247,.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 0 40px; gap: 12px; }
.nav-back { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
.nav-back:hover { opacity: .75; }
.nav-sep { width: 1px; height: 14px; background: var(--divider); }
.nav-title { font-size: 13px; font-weight: 500; color: var(--muted); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.nav-updated { font-size: 11px; color: var(--muted); }

.page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

/* loading */
.loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--divider); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); }

/* filters */
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
.filter-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.filter-select { height: 34px; padding: 0 12px; border: 1px solid var(--divider); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; cursor: pointer; }
.filter-select:focus { border-color: var(--accent); }
.filter-divider { width: 1px; height: 20px; background: var(--divider); }

/* KPI */
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
.kpi-card { background: var(--surface); border: 1px solid var(--divider); border-radius: 14px; padding: 18px 20px; box-shadow: var(--shadow); }
.kpi-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.kpi-value { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.kpi-good { color: var(--green); }
.kpi-bad  { color: var(--red); }

/* sections */
.section { margin-bottom: 28px; }
.section-title { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.chart-card { background: var(--surface); border: 1px solid var(--divider); border-radius: 14px; padding: 24px; box-shadow: var(--shadow); }
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* table */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: right; padding: 8px 12px; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border-bottom: 1.5px solid var(--divider); white-space: nowrap; }
thead th.left { text-align: left; }
tbody tr { border-bottom: 1px solid var(--divider); transition: background .1s; }
tbody tr:hover { background: var(--bg); }
tbody tr.total-row { border-top: 1.5px solid var(--divider); background: var(--bg); font-weight: 700; }
tbody td { padding: 9px 12px; text-align: right; white-space: nowrap; }
tbody td.left { text-align: left; }

@media (max-width: 768px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .topnav { padding: 0 20px; }
  .page { padding: 24px 16px 60px; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-back" href="ai-desk.html">← AI DESK</a>
  <div class="nav-sep"></div>
  <span class="nav-title">마케팅 · 광고 대시보드</span>
  <div class="nav-right">
    <span class="nav-updated" id="navUpdated"></span>
  </div>
</nav>

<div class="page">
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-text">구글 시트에서 데이터를 불러오는 중...</div>
  </div>

  <div id="dashboard" style="display:none">
    <!-- Filters -->
    <div class="filter-bar">
      <span class="filter-label">월</span>
      <select class="filter-select" id="filterMonth" onchange="applyFilters()">
        <option value="">전체</option>
      </select>
      <div class="filter-divider"></div>
      <span class="filter-label">매체</span>
      <select class="filter-select" id="filterMedia" onchange="applyFilters()">
        <option value="">전체</option>
      </select>
      <div class="filter-divider"></div>
      <span class="filter-label">IP</span>
      <select class="filter-select" id="filterIP" onchange="applyFilters()">
        <option value="">전체</option>
      </select>
      <div class="filter-divider"></div>
      <span class="filter-label">캠페인 목표</span>
      <select class="filter-select" id="filterGoal" onchange="applyFilters()">
        <option value="">전체</option>
      </select>
    </div>

    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">총 광고비</div>
        <div class="kpi-value" id="kpiSpend">—</div>
        <div class="kpi-sub" id="kpiSpendSub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">총 매출</div>
        <div class="kpi-value" id="kpiRevenue">—</div>
        <div class="kpi-sub" id="kpiRevenueSub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">ROAS</div>
        <div class="kpi-value" id="kpiRoas">—</div>
        <div class="kpi-sub">매출 ÷ 광고비</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">CTR</div>
        <div class="kpi-value" id="kpiCtr">—</div>
        <div class="kpi-sub" id="kpiCtrSub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">구매 전환율</div>
        <div class="kpi-value" id="kpiCvr">—</div>
        <div class="kpi-sub" id="kpiCvrSub"></div>
      </div>
    </div>

    <!-- Charts row 1 -->
    <div class="chart-grid" style="margin-bottom:20px;">
      <div class="section">
        <div class="section-title">매체별 성과</div>
        <div class="chart-card"><div id="chartMedia"></div></div>
      </div>
      <div class="section">
        <div class="section-title">IP별 매출 구성</div>
        <div class="chart-card"><div id="chartIP"></div></div>
      </div>
    </div>

    <!-- Chart: Monthly trend -->
    <div class="section">
      <div class="section-title">월별 광고비 vs 매출 추이</div>
      <div class="chart-card"><div id="chartTrend"></div></div>
    </div>

    <!-- Chart: Campaign goal -->
    <div class="section">
      <div class="section-title">캠페인 목표별 성과</div>
      <div class="chart-card"><div id="chartGoal"></div></div>
    </div>

    <!-- Table: Media breakdown -->
    <div class="section">
      <div class="section-title">매체별 상세</div>
      <div class="chart-card">
        <div class="tbl-wrap">
          <table id="tblMedia">
            <thead><tr>
              <th class="left">매체</th>
              <th>광고비</th>
              <th>노출</th>
              <th>클릭</th>
              <th>CTR</th>
              <th>구매수</th>
              <th>매출</th>
              <th>ROAS</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Table: IP breakdown -->
    <div class="section">
      <div class="section-title">IP별 상세</div>
      <div class="chart-card">
        <div class="tbl-wrap">
          <table id="tblIP">
            <thead><tr>
              <th class="left">IP</th>
              <th>광고비</th>
              <th>노출</th>
              <th>클릭</th>
              <th>구매수</th>
              <th>매출</th>
              <th>ROAS</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1NHxVgkYn3WYiuQKqpb-80EWwDC6yH6uTQwCoBS_Um_o';
const SHEET_GID = '1434908615';
const COLORS = ['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5ac8fa','#ff6482','#30b0c7','#ffcc00','#8e8e93'];

let allRows = [];
let filtered = [];

// ── 숫자 파싱 ──
function toNum(v) {
  if (!v) return 0;
  return parseFloat(String(v).replace(/,/g,'')) || 0;
}

function fmtKRW(v) {
  if (v >= 1e8) return (v/1e8).toFixed(1) + '억';
  if (v >= 1e4) return Math.round(v/1e4).toLocaleString() + '만';
  return v.toLocaleString() + '원';
}

function fmtNum(v) {
  return v >= 1e4 ? (v/1e4).toFixed(1)+'만' : v.toLocaleString();
}

function pct(a, b) { return b > 0 ? (a/b*100).toFixed(2)+'%' : '—'; }

// ── 데이터 로드 ──
async function loadData() {
  try {
    const res = await fetch(`/api/sheets?id=${SHEET_ID}&gid=${SHEET_GID}`);
    const json = await res.json();
    if (!res.ok || !json.rows) throw new Error(json.error || 'Load failed');

    // 유효 행만 (광고비나 매출이 있는 것)
    allRows = json.rows.filter(r => toNum(r['광고비']) > 0 || toNum(r['매출']) > 0);

    // 필터 옵션 채우기
    populateFilter('filterMonth', [...new Set(allRows.map(r => r['월 구분']).filter(Boolean))].sort());
    populateFilter('filterMedia', [...new Set(allRows.map(r => r['매체']).filter(Boolean))].sort());
    populateFilter('filterIP',    [...new Set(allRows.map(r => r['IP']).filter(Boolean))].sort());
    populateFilter('filterGoal',  [...new Set(allRows.map(r => r['캠페인 목표']).filter(Boolean))].sort());

    document.getElementById('navUpdated').textContent = '업데이트: ' + new Date().toLocaleDateString('ko-KR');
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    applyFilters();
  } catch(e) {
    document.getElementById('loadingWrap').innerHTML = `<div style="color:#c0392b;font-size:14px;">데이터 로드 실패: ${e.message}</div>`;
  }
}

function populateFilter(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const month = document.getElementById('filterMonth').value;
  const media = document.getElementById('filterMedia').value;
  const ip    = document.getElementById('filterIP').value;
  const goal  = document.getElementById('filterGoal').value;

  filtered = allRows.filter(r =>
    (!month || r['월 구분'] === month) &&
    (!media || r['매체']    === media) &&
    (!ip    || r['IP']      === ip)    &&
    (!goal  || r['캠페인 목표'] === goal)
  );

  renderAll();
}

// ── 집계 ──
function aggregate(rows, key) {
  const map = {};
  rows.forEach(r => {
    const k = r[key] || '기타';
    if (!map[k]) map[k] = { spend:0, impression:0, click:0, purchase:0, revenue:0 };
    map[k].spend      += toNum(r['광고비']);
    map[k].impression += toNum(r['노출']);
    map[k].click      += toNum(r['클릭']);
    map[k].purchase   += toNum(r['구매 수']);
    map[k].revenue    += toNum(r['매출']);
  });
  return Object.entries(map).map(([name, v]) => ({ name, ...v }))
    .sort((a,b) => b.spend - a.spend);
}

// ── 렌더 ──
function renderAll() {
  const spend      = filtered.reduce((s,r) => s + toNum(r['광고비']), 0);
  const revenue    = filtered.reduce((s,r) => s + toNum(r['매출']), 0);
  const impression = filtered.reduce((s,r) => s + toNum(r['노출']), 0);
  const click      = filtered.reduce((s,r) => s + toNum(r['클릭']), 0);
  const purchase   = filtered.reduce((s,r) => s + toNum(r['구매 수']), 0);
  const roas = spend > 0 ? (revenue/spend).toFixed(2) : 0;
  const ctr  = impression > 0 ? (click/impression*100).toFixed(2) : 0;
  const cvr  = click > 0 ? (purchase/click*100).toFixed(2) : 0;

  document.getElementById('kpiSpend').textContent   = fmtKRW(spend);
  document.getElementById('kpiRevenue').textContent  = fmtKRW(revenue);
  document.getElementById('kpiRoas').textContent     = roas + 'x';
  document.getElementById('kpiCtr').textContent      = ctr + '%';
  document.getElementById('kpiCvr').textContent      = cvr + '%';
  document.getElementById('kpiSpendSub').textContent  = impression > 0 ? '노출 ' + fmtNum(impression) : '';
  document.getElementById('kpiRevenueSub').textContent = '구매 ' + purchase.toLocaleString() + '건';
  document.getElementById('kpiCtrSub').textContent   = '클릭 ' + fmtNum(click);
  document.getElementById('kpiCvrSub').textContent   = '클릭 → 구매';

  const roasEl = document.getElementById('kpiRoas');
  roasEl.className = 'kpi-value ' + (roas >= 3 ? 'kpi-good' : roas < 1 ? 'kpi-bad' : '');

  const byMedia = aggregate(filtered, '매체');
  const byIP    = aggregate(filtered, 'IP');
  const byGoal  = aggregate(filtered, '캠페인 목표');

  // 월별 트렌드
  const byMonth = {};
  filtered.forEach(r => {
    const m = r['월 구분'] || '기타';
    if (!byMonth[m]) byMonth[m] = { spend:0, revenue:0 };
    byMonth[m].spend   += toNum(r['광고비']);
    byMonth[m].revenue += toNum(r['매출']);
  });
  const monthKeys = Object.keys(byMonth).sort();

  drawMediaChart(byMedia);
  drawIPDonut(byIP);
  drawTrendChart(monthKeys, byMonth);
  drawGoalChart(byGoal);
  renderTable('tblMedia', byMedia, true);
  renderTable('tblIP', byIP, false);
}

// ── SVG 차트 ──
function drawMediaChart(data) {
  const el = document.getElementById('chartMedia');
  const list = data.slice(0, 8);
  if (!list.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;">데이터 없음</p>'; return; }

  const maxSpend = Math.max(...list.map(d => d.spend));
  const maxRev   = Math.max(...list.map(d => d.revenue));
  const W = 500, rowH = 44, H = list.length * rowH + 30;

  let svg = '';
  list.forEach((d, i) => {
    const y = i * rowH + 5;
    const bw = maxSpend > 0 ? (d.spend / maxSpend) * 260 : 0;
    const rw = maxRev   > 0 ? (d.revenue / maxRev) * 260 : 0;
    const name = d.name.length > 16 ? d.name.slice(0,16)+'..' : d.name;
    const roas = d.spend > 0 ? (d.revenue/d.spend).toFixed(1)+'x' : '—';
    const roasColor = d.spend > 0 && d.revenue/d.spend >= 3 ? '#1a7f4b' : '#c0392b';

    svg += `<text x="0" y="${y+14}" font-size="11" fill="#1d1d1f">${name}</text>`;
    svg += `<rect x="0" y="${y+18}" width="${bw}" height="8" rx="2" fill="rgba(0,113,227,0.2)"/>`;
    svg += `<rect x="0" y="${y+18}" width="${Math.min(rw,bw)}" height="8" rx="2" fill="#0071e3"/>`;
    if (rw > bw) {
      svg += `<rect x="0" y="${y+20}" width="${rw}" height="4" rx="2" fill="rgba(52,199,89,0.6)"/>`;
    }
    svg += `<text x="${Math.max(bw,rw)+8}" y="${y+27}" font-size="10" fill="${roasColor}" font-weight="600">ROAS ${roas}</text>`;
    svg += `<text x="${Math.max(bw,rw)+8}" y="${y+38}" font-size="9" fill="rgba(0,0,0,0.35)">${fmtKRW(d.spend)} → ${fmtKRW(d.revenue)}</text>`;
  });

  // legend
  svg += `<rect x="0" y="${H-16}" width="8" height="8" rx="1" fill="rgba(0,113,227,0.2)"/>`;
  svg += `<text x="12" y="${H-8}" font-size="9" fill="rgba(0,0,0,0.45)">광고비</text>`;
  svg += `<rect x="50" y="${H-16}" width="8" height="8" rx="1" fill="#0071e3"/>`;
  svg += `<text x="62" y="${H-8}" font-size="9" fill="rgba(0,0,0,0.45)">매출(광고비 이하)</text>`;
  svg += `<rect x="160" y="${H-16}" width="8" height="8" rx="1" fill="rgba(52,199,89,0.6)"/>`;
  svg += `<text x="172" y="${H-8}" font-size="9" fill="rgba(0,0,0,0.45)">매출(광고비 초과)</text>`;

  el.innerHTML = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">${svg}</svg>`;
}

function drawIPDonut(data) {
  const el = document.getElementById('chartIP');
  const list = data.filter(d => d.revenue > 0).slice(0, 8);
  if (!list.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;">데이터 없음</p>'; return; }

  const total = list.reduce((s,d) => s+d.revenue, 0);
  const cx=100, cy=100, r=80, inner=50;
  let startAngle = -Math.PI/2;
  let paths = '', legends = '';

  list.forEach((d, i) => {
    const share = d.revenue / total;
    if (share < 0.005) return;
    const end = startAngle + share * 2 * Math.PI;
    const la = share > 0.5 ? 1 : 0;
    const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(end),        y2=cy+r*Math.sin(end);
    const ix1=cx+inner*Math.cos(startAngle), iy1=cy+inner*Math.sin(startAngle);
    const ix2=cx+inner*Math.cos(end),        iy2=cy+inner*Math.sin(end);
    paths += `<path d="M${x1},${y1} A${r},${r} 0 ${la},1 ${x2},${y2} L${ix2},${iy2} A${inner},${inner} 0 ${la},0 ${ix1},${iy1} Z" fill="${COLORS[i%COLORS.length]}" opacity="0.85"/>`;
    startAngle = end;

    const name = d.name.length > 10 ? d.name.slice(0,10)+'..' : d.name;
    legends += `<g transform="translate(210,${i*22+10})">
      <rect width="10" height="10" rx="2" fill="${COLORS[i%COLORS.length]}" opacity="0.85"/>
      <text x="14" y="10" font-size="11" fill="#1d1d1f">${name}</text>
      <text x="120" y="10" font-size="11" fill="rgba(0,0,0,0.45)" text-anchor="end">${(share*100).toFixed(1)}%</text>
    </g>`;
  });

  paths += `<text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.45)">총 매출</text>`;
  paths += `<text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="14" font-weight="700" fill="#1d1d1f">${fmtKRW(total)}</text>`;

  el.innerHTML = `<svg width="100%" viewBox="0 0 340 210" style="overflow:visible">${paths}${legends}</svg>`;
}

function drawTrendChart(keys, byMonth) {
  const el = document.getElementById('chartTrend');
  if (!keys.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;">데이터 없음</p>'; return; }

  const W=700, H=180, padL=50, padB=30, padT=10;
  const maxVal = Math.max(...keys.map(k => Math.max(byMonth[k].spend, byMonth[k].revenue)));
  const gW = W - padL - 20;
  const gH = H - padB - padT;
  const xStep = gW / (keys.length - 1 || 1);

  const spendPts  = keys.map((k,i) => [padL + i*xStep, padT + gH - (byMonth[k].spend/maxVal)*gH]);
  const revPts    = keys.map((k,i) => [padL + i*xStep, padT + gH - (byMonth[k].revenue/maxVal)*gH]);

  const toPath = pts => pts.map((p,i) => (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const toArea = (pts, H2) => toPath(pts) + ` L${pts[pts.length-1][0]},${H2} L${pts[0][0]},${H2} Z`;

  let svg = '';

  // grid lines
  [0,.25,.5,.75,1].forEach(t => {
    const y = padT + gH * (1-t);
    const v = maxVal * t;
    svg += `<line x1="${padL}" y1="${y}" x2="${W-20}" y2="${y}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>`;
    svg += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="rgba(0,0,0,0.3)">${fmtKRW(v)}</text>`;
  });

  // areas
  svg += `<path d="${toArea(spendPts, padT+gH)}" fill="rgba(0,113,227,0.08)"/>`;
  svg += `<path d="${toArea(revPts, padT+gH)}" fill="rgba(52,199,89,0.08)"/>`;
  // lines
  svg += `<path d="${toPath(spendPts)}" fill="none" stroke="#0071e3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg += `<path d="${toPath(revPts)}" fill="none" stroke="#34c759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;

  // labels
  keys.forEach((k, i) => {
    const x = padL + i*xStep;
    svg += `<text x="${x}" y="${H}" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.4)">${k}</text>`;
    // dots
    svg += `<circle cx="${spendPts[i][0]}" cy="${spendPts[i][1]}" r="3" fill="#0071e3"/>`;
    svg += `<circle cx="${revPts[i][0]}"   cy="${revPts[i][1]}"   r="3" fill="#34c759"/>`;
  });

  // legend
  svg += `<circle cx="${padL}" cy="${H+14}" r="4" fill="#0071e3"/>`;
  svg += `<text x="${padL+8}" y="${H+18}" font-size="10" fill="rgba(0,0,0,0.45)">광고비</text>`;
  svg += `<circle cx="${padL+60}" cy="${H+14}" r="4" fill="#34c759"/>`;
  svg += `<text x="${padL+68}" y="${H+18}" font-size="10" fill="rgba(0,0,0,0.45)">매출</text>`;

  el.innerHTML = `<svg width="100%" viewBox="0 0 ${W} ${H+26}" style="overflow:visible">${svg}</svg>`;
}

function drawGoalChart(data) {
  const el = document.getElementById('chartGoal');
  if (!data.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;">데이터 없음</p>'; return; }

  const W=700, rowH=48;
  const H = data.length * rowH + 20;
  const maxSpend = Math.max(...data.map(d=>d.spend));
  const barMaxW = 400;

  let svg = '';
  data.forEach((d, i) => {
    const y = i * rowH + 4;
    const bw = maxSpend > 0 ? (d.spend/maxSpend)*barMaxW : 0;
    const roas = d.spend > 0 ? (d.revenue/d.spend).toFixed(1) : 0;
    const roasColor = roas >= 3 ? '#1a7f4b' : roas < 1 ? '#c0392b' : '#b95000';
    svg += `<text x="0" y="${y+14}" font-size="12" fill="#1d1d1f" font-weight="600">${d.name}</text>`;
    svg += `<rect x="0" y="${y+20}" width="${bw}" height="14" rx="3" fill="${COLORS[i%COLORS.length]}" opacity="0.7"/>`;
    svg += `<text x="${bw+8}" y="${y+32}" font-size="11" fill="${roasColor}" font-weight="700">ROAS ${roas}x</text>`;
    svg += `<text x="${bw+70}" y="${y+32}" font-size="10" fill="rgba(0,0,0,0.4)">${fmtKRW(d.spend)} / 매출 ${fmtKRW(d.revenue)}</text>`;
  });

  el.innerHTML = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">${svg}</svg>`;
}

function renderTable(tableId, data, showPurchase) {
  const tbody = document.querySelector(`#${tableId} tbody`);
  const totals = data.reduce((acc, d) => ({
    spend: acc.spend+d.spend, impression: acc.impression+d.impression,
    click: acc.click+d.click, purchase: acc.purchase+d.purchase, revenue: acc.revenue+d.revenue
  }), {spend:0,impression:0,click:0,purchase:0,revenue:0});

  const row = (d) => {
    const roas = d.spend > 0 ? (d.revenue/d.spend).toFixed(2) : '—';
    const ctr  = d.impression > 0 ? (d.click/d.impression*100).toFixed(2)+'%' : '—';
    const roasColor = d.spend > 0 && d.revenue/d.spend >= 3 ? 'color:#1a7f4b;font-weight:700' : d.spend > 0 && d.revenue/d.spend < 1 ? 'color:#c0392b;font-weight:700' : '';
    return `<tr>
      <td class="left">${d.name}</td>
      <td>${fmtKRW(d.spend)}</td>
      <td>${fmtNum(d.impression)}</td>
      <td>${fmtNum(d.click)}</td>
      <td>${ctr}</td>
      ${showPurchase ? `<td>${d.purchase.toLocaleString()}</td>` : ''}
      <td>${fmtKRW(d.revenue)}</td>
      <td style="${roasColor}">${roas}x</td>
    </tr>`;
  };

  const tot = totals;
  const tRoas = tot.spend > 0 ? (tot.revenue/tot.spend).toFixed(2) : '—';
  const tCtr  = tot.impression > 0 ? (tot.click/tot.impression*100).toFixed(2)+'%' : '—';

  tbody.innerHTML = data.map(row).join('') + `
    <tr class="total-row">
      <td class="left">합계</td>
      <td>${fmtKRW(tot.spend)}</td>
      <td>${fmtNum(tot.impression)}</td>
      <td>${fmtNum(tot.click)}</td>
      <td>${tCtr}</td>
      ${showPurchase ? `<td>${tot.purchase.toLocaleString()}</td>` : ''}
      <td>${fmtKRW(tot.revenue)}</td>
      <td>${tRoas}x</td>
    </tr>`;
}

loadData();
</script>
</body>
