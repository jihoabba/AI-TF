<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEA — AX TF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7;
    --surface: #fff;
    --text: #1d1d1f;
    --muted: rgba(0,0,0,0.4);
    --accent: #0071e3;
    --divider: rgba(0,0,0,0.08);
  }
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { text-align: center; padding: 48px; }
  .badge {
    display: inline-block;
    padding: 6px 14px;
    background: rgba(0,113,227,0.1);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border-radius: 100px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  p { font-size: 16px; color: var(--muted); line-height: 1.6; }
  .back { display: inline-flex; align-items: center; gap: 6px; margin-top: 32px; font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">IDEA</div>
  <h1>아이디어 파일을 추가해주세요</h1>
  <p>이 폴더에 아이디어 HTML 파일을 추가하고<br>index.html의 docs 배열에 등록하면 됩니다.</p>
  <a class="back" href="../index.html">← 아카이브로 돌아가기</a>
</div>
</body>
</html>
