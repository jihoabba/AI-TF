<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="tf-type"   content="idea">
<meta name="tf-title"  content="AI DESK">
<meta name="tf-desc"   content="팀별 동물 캐릭터 AI 에이전트 GUI. 캐릭터 클릭 시 해당 팀의 AI 서비스 패널이 열리는 컨셉츄얼한 인터페이스.">
<meta name="tf-date"   content="2026-03-30">
<meta name="tf-tags"   content="idea,ai-agent,gui">
<meta name="tf-status" content="Draft">
<title>AI DESK — LINE FRIENDS SQUARE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f0f5;
    --text: #1d1d1f;
    --text-2: rgba(29,29,31,0.5);
    --text-3: rgba(29,29,31,0.25);
    --divider: rgba(0,0,0,0.08);
    --panel-bg: #ffffff;
    --panel-surface: #f5f5f7;
    --accent: #0071e3;
  }

  html, body {
    background: var(--bg);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 배경 ── */
  .bg-scene {
    position: fixed; inset: 0; z-index: 0;
    background: var(--bg);
  }

  /* ── Header ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 52px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-2); }
  .header-sep  { width: 1px; height: 13px; background: var(--divider); }
  .header-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
  .header-badge { padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: rgba(0,113,227,0.1); border: 1px solid rgba(0,113,227,0.2); color: #0071e3; }

  /* ── Main layout ── */
  .scene {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 52px;
  }

  /* ── Title area ── */
  .title-area {
    text-align: center;
    padding: 48px 24px 0;
    animation: fadeDown 0.6s ease forwards;
  }

  .title-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .title-eyebrow::before, .title-eyebrow::after { content: ''; width: 20px; height: 1px; background: rgba(0,113,227,0.3); }

  .title-main {
    font-family: 'Syne', sans-serif;
    font-size: 42px; font-weight: 800;
    letter-spacing: -0.02em; line-height: 1.1;
    margin-bottom: 12px;
    color: var(--text);
  }

  .title-sub { font-size: 14px; color: var(--text-2); line-height: 1.6; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Panel (서비스 패널) ── */
  .service-panel {
    width: 100%;
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 24px;
    display: none;
    animation: fadeUp 0.25s ease forwards;
  }
  .service-panel.show { display: block; }

  .sp-inner {
    background: #ffffff;
    border: 1px solid var(--divider);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
  }

  .sp-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; gap: 12px;
  }
  .sp-avatar { font-size: 28px; flex-shrink: 0; }
  .sp-info   { flex: 1; }
  .sp-name   { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .sp-sub    { font-size: 12px; color: var(--text-2); }
  .sp-close  {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.05); border: 1px solid var(--divider);
    color: var(--text-2); font-size: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .sp-close:hover { background: rgba(0,0,0,0.1); color: var(--text); }

  .sp-services {
    display: grid; grid-template-columns: repeat(3, 1fr);
  }

  .sp-service {
    padding: 20px 22px;
    border-right: 1px solid var(--divider);
    cursor: pointer;
    transition: background 0.15s;
  }
  .sp-service:last-child { border-right: none; }
  .sp-service:hover { background: rgba(0,113,227,0.04); }

  .sp-svc-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(0,113,227,0.08);
    border: 1px solid rgba(0,113,227,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 10px;
  }
  .sp-svc-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .sp-svc-desc { font-size: 11px; color: var(--text-2); line-height: 1.5; margin-bottom: 8px; }
  .sp-svc-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .sp-svc-tag {
    padding: 2px 7px; border-radius: 100px; font-size: 10px; font-weight: 600;
    background: rgba(0,113,227,0.08); border: 1px solid rgba(0,113,227,0.15); color: #0071e3;
  }

  .sp-chat {
    padding: 14px 20px; border-top: 1px solid var(--divider);
    display: flex; gap: 8px; align-items: center;
    background: var(--panel-surface);
  }
  .sp-chat-input {
    flex: 1; height: 36px; padding: 0 14px;
    background: #ffffff;
    border: 1px solid var(--divider);
    border-radius: 100px;
    color: var(--text); font-size: 12px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .sp-chat-input::placeholder { color: var(--text-3); }
  .sp-chat-input:focus { border-color: rgba(0,113,227,0.5); }
  .sp-chat-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: #0071e3; border: none; color: #fff;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .sp-chat-btn:hover { opacity: 0.85; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── DESK SCENE ── */
  .desk-scene {
    width: 100%;
    position: relative;
    margin-top: auto;
    flex-shrink: 0;
  }

  /* 책상 면 */
  .desk-surface {
    width: 100%;
    height: 90px;
    background: linear-gradient(180deg, #e8c07a 0%, #d4a96a 50%, #c49558 100%);
    position: relative;
    box-shadow: 0 -4px 24px rgba(160,100,30,0.2), inset 0 1px 0 rgba(255,255,255,0.35);
  }

  /* 책상 앞면 */
  .desk-front {
    width: 100%;
    height: 40px;
    background: linear-gradient(180deg, #b8935a 0%, #a07845 100%);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }

  /* 캐릭터들 줄 */
  .characters-row {
    position: absolute;
    bottom: 100%; /* 책상 위 */
    left: 0; right: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    padding: 0 40px;
  }

  /* 개별 캐릭터 */
  .char-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    flex: 1;
    max-width: 140px;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  .char-wrap:hover { transform: translateY(-8px); }
  .char-wrap.active { transform: translateY(-12px); }

  /* 말풍선 */
  .char-bubble {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    color: #1a1025;
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 11px; font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    transform: translateX(-50%) translateY(4px);
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .char-bubble::after {
    content: '';
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: rgba(255,255,255,0.95);
  }

  .char-wrap:hover .char-bubble {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 노트북 */
  .char-laptop {
    width: 56px; height: 6px;
    background: linear-gradient(180deg, #c49558 0%, #a87840 100%);
    border-radius: 2px 2px 0 0;
    position: relative;
    margin-bottom: 0;
    box-shadow: 0 -2px 6px rgba(150,100,30,0.2);
  }

  .char-laptop::before {
    content: '';
    position: absolute;
    bottom: 100%; left: 3px; right: 3px;
    height: 32px;
    background: linear-gradient(180deg, #e8e8ed 0%, #d8d8dd 100%);
    border-radius: 4px 4px 0 0;
    border: 1px solid rgba(0,0,0,0.1);
    border-bottom: none;
  }

  .char-laptop::after {
    content: '';
    position: absolute;
    bottom: 100%; left: 3px; right: 3px;
    height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(0,113,227,0.12), rgba(99,149,255,0.08));
    border-radius: 4px 4px 0 0;
    border: 1px solid rgba(0,0,0,0.1);
    border-bottom: none;
  }

  /* 노트북 스크린 */
  .laptop-screen {
    position: absolute;
    bottom: 6px; left: 3px; right: 3px;
    height: 32px;
    border-radius: 4px 4px 0 0;
    border: 1px solid rgba(0,0,0,0.1);
    border-bottom: none;
    background: linear-gradient(135deg, #dbeafe, #eff6ff);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  .laptop-screen::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,113,227,0.2), rgba(99,149,255,0.1));
    animation: screenPulse 3s ease-in-out infinite;
  }

  @keyframes screenPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* 캐릭터 바디 */
  .char-body {
    position: relative;
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    transition: filter 0.2s;
    z-index: 2;
    margin-bottom: -2px;
  }

  .char-body img {
    width: 80px; height: 80px;
    object-fit: contain;
    mix-blend-mode: multiply;
    display: block;
  }

  .char-wrap.ceo .char-body {
    width: 100px; height: 100px;
  }
  .char-wrap.ceo .char-body img {
    width: 100px; height: 100px;
  }

  .char-wrap:hover .char-body { filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2)); }
  .char-wrap.active .char-body { filter: drop-shadow(0 8px 24px rgba(0,113,227,0.3)); }

  /* 캐릭터 이름 */
  .char-name {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--text-2);
    text-align: center;
    position: absolute;
    bottom: -18px;
    left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    transition: color 0.2s;
  }
  .char-wrap:hover .char-name { color: var(--text); }
  .char-wrap.active .char-name { color: var(--accent); }

  /* 상태 표시 */
  .char-status {
    width: 8px; height: 8px; border-radius: 50%;
    position: absolute; top: 6px; right: 6px;
    border: 1.5px solid rgba(255,255,255,0.9);
    animation: statusPulse 2s ease-in-out infinite;
  }
  .s-online  { background: #4ade80; }
  .s-busy    { background: #fb923c; }
  .s-standby { background: #64748b; animation: none; }

  @keyframes statusPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); } 50% { box-shadow: 0 0 0 4px rgba(74,222,128,0); } }

  /* 책상 위 소품 */
  .desk-props {
    position: absolute;
    bottom: 8px;
    display: flex; align-items: flex-end; gap: 8px;
  }
  .desk-props.left  { left: 24px; }
  .desk-props.right { right: 24px; }

  .prop { font-size: 20px; opacity: 0.6; }
  .prop-small { font-size: 14px; opacity: 0.4; }

  /* 바닥 그림자 */
  .desk-glow {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,169,106,0.8), rgba(232,192,122,0.6), rgba(212,169,106,0.8), transparent);
  }

  /* ── Bottom request bar ── */
  .request-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 12px 40px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--divider);
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .request-text { font-size: 12px; color: var(--text-2); }
  .request-btn {
    padding: 7px 16px; border-radius: 8px;
    background: #0071e3;
    border: none;
    color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .request-btn:hover { opacity: 0.85; }

  @media (max-width: 768px) {
    .characters-row { gap: 0; padding: 0 12px; }
    .char-body { width: 56px; height: 56px; }
    .char-body img { width: 56px; height: 56px; }
    .char-wrap.ceo .char-body, .char-wrap.ceo .char-body img { width: 70px; height: 70px; }
    .char-laptop { width: 56px; }
    .sp-services { grid-template-columns: 1fr; }
    .sp-service { border-right: none; border-bottom: 1px solid var(--divider); }
    .title-main { font-size: 28px; }
    .header { padding: 0 20px; }
    .request-bar { padding: 12px 20px; }
  }
</style>
</head>
<body>

<div class="bg-scene"></div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">LINE FRIENDS SQUARE</span>
    <div class="header-sep"></div>
    <span class="header-title">AI DESK</span>
  </div>
  <span class="header-badge">Beta · AI TF</span>
</header>

<!-- Scene -->
<div class="scene">

  <!-- Title -->
  <div class="title-area">
    <div class="title-eyebrow">Character AI Agents</div>
    <h1 class="title-main">팀의 AI를 만나보세요</h1>
    <p class="title-sub">캐릭터를 클릭하면 해당 팀의 AI 서비스가 열립니다</p>
  </div>

  <!-- Service Panel -->
  <div class="service-panel" id="servicePanel">
    <div class="sp-inner">
      <div class="sp-header">
        <div class="sp-avatar" id="spAvatar"></div>
        <div class="sp-info">
          <div class="sp-name" id="spName"></div>
          <div class="sp-sub" id="spSub"></div>
        </div>
        <button class="sp-close" onclick="closePanel()">✕</button>
      </div>
      <div class="sp-services" id="spServices"></div>
      <div class="sp-chat">
        <input class="sp-chat-input" type="text" id="spChatInput" placeholder="무엇이 궁금하세요?">
        <button class="sp-chat-btn">↑</button>
      </div>
    </div>
  </div>

  <!-- Spacer -->
  <div style="flex:1; min-height: 24px;"></div>

  <!-- Desk Scene -->
  <div class="desk-scene">
    <div class="desk-surface">
      <div class="desk-glow"></div>

      <!-- 캐릭터들 -->
      <div class="characters-row">

        <div class="char-wrap" onclick="openPanel('hr')" id="char-hr">
          <div class="char-bubble">HR</div>
          <div class="char-body">
            <img src="assets/characters/hr.png" data-character="hr">
            <div class="char-status s-standby"></div>
          </div>

          <div class="char-name">HR</div>
        </div>

        <div class="char-wrap" onclick="openPanel('logistics')" id="char-logistics">
          <div class="char-bubble">물류</div>
          <div class="char-body">
            <img src="assets/characters/logistic.png" data-character="logistics">
            <div class="char-status s-standby"></div>
          </div>

          <div class="char-name">물류</div>
        </div>

        <div class="char-wrap" onclick="openPanel('offline')" id="char-offline">
          <div class="char-bubble">오프라인</div>
          <div class="char-body">
            <img src="assets/characters/offline.png" data-character="offline">
            <div class="char-status s-busy"></div>
          </div>

          <div class="char-name">오프라인</div>
        </div>

        <div class="char-wrap" onclick="openPanel('marketing')" id="char-marketing">
          <div class="char-bubble">마케팅</div>
          <div class="char-body">
            <img src="assets/characters/mkt.png" data-character="marketing">
            <div class="char-status s-online"></div>
          </div>

          <div class="char-name">마케팅</div>
        </div>

        <div class="char-wrap ceo" onclick="openPanel('ceo')" id="char-ceo">
          <div class="char-bubble">대표</div>
          <div class="char-body">
            <img src="assets/characters/ceo.png" data-character="ceo">
            <div class="char-status s-online"></div>
          </div>

          <div class="char-name">대표</div>
        </div>

        <div class="char-wrap" onclick="openPanel('md')" id="char-md">
          <div class="char-bubble">MD</div>
          <div class="char-body">
            <img src="assets/characters/md.png" data-character="md">
            <div class="char-status s-online"></div>
          </div>

          <div class="char-name">MD</div>
        </div>

        <div class="char-wrap" onclick="openPanel('commerce')" id="char-commerce">
          <div class="char-bubble">커머스</div>
          <div class="char-body">
            <img src="assets/characters/commerce.png" data-character="commerce">
            <div class="char-status s-online"></div>
          </div>

          <div class="char-name">커머스</div>
        </div>

        <div class="char-wrap" onclick="openPanel('b2b')" id="char-b2b">
          <div class="char-bubble">B2B</div>
          <div class="char-body">
            <img src="assets/characters/b2b.png" data-character="b2b">
            <div class="char-status s-online"></div>
          </div>

          <div class="char-name">B2B</div>
        </div>

        <div class="char-wrap" onclick="openPanel('cx')" id="char-cx">
          <div class="char-bubble">CX</div>
          <div class="char-body">
            <img src="assets/characters/cx.png" data-character="cx">
            <div class="char-status s-busy"></div>
          </div>

          <div class="char-name">CX</div>
        </div>

      </div>
    </div>
    <div class="desk-front"></div>
  </div>

</div>

<!-- Bottom bar -->
<div class="request-bar">
  <span class="request-text">우리 팀 업무 자동화를 요청하고 싶다면</span>
  <button class="request-btn">AI TF에게 요청하기 →</button>
</div>

<script>
  const data = {
    ceo: {
      character: 'ceo', name: '대표', sub: 'CEO · 온라인',
      services: [
        { icon: '📋', name: '대표 지시사항', desc: 'TF 방향 및 이번 주 대표 지시사항 확인', tags: ['방향','우선순위','TF'] },
        { icon: '📊', name: '주간 브리핑', desc: '전사 주요 KPI 및 이슈 자동 요약 리포트', tags: ['KPI','브리핑','주간'] },
      ]
    },
    marketing: {
      character: 'marketing', name: '마케팅', sub: '마케팅팀 AI 에이전트 · 온라인',

  let current = null;

  function openPanel(team) {
    const d = data[team];
    if (!d) return;

    document.querySelectorAll('.char-wrap').forEach(c => c.classList.remove('active'));
    document.getElementById('char-' + team).classList.add('active');

    const imgFile = d.character === 'logistics' ? 'logistic' : d.character;
    document.getElementById('spAvatar').innerHTML = `<img src="assets/characters/${imgFile}.png" data-character="${d.character}" style="width:36px;height:36px;object-fit:contain;mix-blend-mode:multiply;">`;
    document.getElementById('spName').textContent = d.name;
    document.getElementById('spSub').textContent = d.sub;
    document.getElementById('spChatInput').placeholder = `${d.name}에게 물어보세요...`;

    document.getElementById('spServices').innerHTML = d.services.map(s => `
      <div class="sp-service">
        <div class="sp-svc-icon">${s.icon}</div>
        <div class="sp-svc-name">${s.name}</div>
        <div class="sp-svc-desc">${s.desc}</div>
        <div class="sp-svc-tags">${s.tags.map(t => `<span class="sp-svc-tag">${t}</span>`).join('')}</div>
      </div>
    `).join('');

    const panel = document.getElementById('servicePanel');
    panel.classList.add('show');
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    current = team;
  }

  function closePanel() {
    document.getElementById('servicePanel').classList.remove('show');
    document.querySelectorAll('.char-wrap').forEach(c => c.classList.remove('active'));
    current = null;
  }
